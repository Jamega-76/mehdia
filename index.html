<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mehdia Surf</title>
<link rel="icon" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mehdia Surf">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#000;--muted:rgba(255,255,255,0.4);--card:rgba(255,255,255,0.05);--border:rgba(255,255,255,0.09)}
html,body{height:100%;background:#000;color:#fff;font-family:'Inter',-apple-system,sans-serif;overflow-x:hidden}

/* LOADING */
#loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:18px}
.loader{width:44px;height:44px;border:2px solid rgba(0,255,136,0.15);border-top-color:#00ff88;border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:11px;color:var(--muted);letter-spacing:3px;text-transform:uppercase;animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}

/* LAYOUT */
.screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:52px 20px 40px;max-width:420px;margin:0 auto;gap:18px}

/* TOP BUTTONS */
.top-btns{position:fixed;top:14px;right:14px;z-index:100;display:flex;gap:8px}
.top-btn{width:36px;height:36px;background:var(--card);border:1px solid var(--border);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);transition:.2s;position:relative}
.top-btn:hover{color:#fff;border-color:rgba(255,255,255,.25)}
.notif-dot{position:absolute;top:7px;right:7px;width:5px;height:5px;border-radius:50%;background:#00ff88;display:none}
.notif-dot.on{display:block}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:rgba(20,20,20,.96);border:1px solid var(--border);border-radius:100px;padding:10px 20px;font-size:13px;color:#fff;white-space:nowrap;transition:transform .35s cubic-bezier(.34,1.56,.64,1);z-index:500;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:300;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:.25s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:#111;border:1px solid var(--border);border-radius:24px 24px 0 0;width:100%;max-width:420px;padding:28px 24px 44px;transform:translateY(100%);transition:.3s cubic-bezier(.34,1.1,.64,1);max-height:85vh;overflow-y:auto}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-title{font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:22px;color:rgba(255,255,255,.7);display:flex;align-items:center;justify-content:space-between}
.modal-close{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:2px 6px}

/* HEADER */
.header{text-align:center;animation:fadeUp .5s ease forwards;opacity:0;width:100%}
.header h1{font-size:22px;font-weight:700;margin-bottom:4px}
.dt{font-size:13px;color:var(--muted)}
.sun-row{display:flex;align-items:center;justify-content:center;gap:14px;margin-top:7px}
.sun-item{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--muted)}

/* BEST HOUR BANNER */
.best-banner{width:100%;background:rgba(0,255,136,.06);border:1px solid rgba(0,255,136,.2);border-radius:12px;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;animation:fadeUp .5s .04s ease forwards;opacity:0;cursor:pointer;transition:.15s}
.best-banner:hover{background:rgba(0,255,136,.1)}
.best-banner-left{font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:rgba(0,255,136,.7)}
.best-banner-right{font-size:13px;font-weight:800;color:#00ff88}

/* RING */
.ring-section{animation:fadeUp .5s .1s ease forwards;opacity:0}
.ring-wrapper{position:relative;width:220px;height:220px}
.ring-svg{width:220px;height:220px;transform:rotate(-90deg)}
.ring-track{fill:none;stroke:rgba(255,255,255,.07);stroke-width:5}
.ring-arc{fill:none;stroke-width:5;stroke-linecap:round;stroke-dasharray:597;stroke-dashoffset:597;transition:stroke-dashoffset 1.8s cubic-bezier(.34,1.1,.64,1)}
.ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px}
.ring-label{font-size:19px;font-weight:900;letter-spacing:2px;text-transform:uppercase;line-height:1;margin-bottom:8px}
.ring-sub{font-size:12px;color:rgba(255,255,255,.6);line-height:1.5}

/* STATS */
.stats{display:flex;align-items:stretch;width:100%;animation:fadeUp .5s .2s ease forwards;opacity:0}
.stat{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;padding:4px 0}
.sdiv{width:1px;background:var(--border);margin:6px 0}
.stat-icon{width:26px;height:26px;color:rgba(255,255,255,.5)}
.stat-val{font-size:21px;font-weight:800;line-height:1;letter-spacing:-1px}
.unit{font-size:11px;font-weight:500;color:rgba(255,255,255,.5);letter-spacing:0}
.stat-sub{font-size:10px;font-weight:600;color:var(--muted);letter-spacing:.8px;text-transform:uppercase;text-align:center}
.wind-arrow{width:24px;height:24px;color:rgba(255,255,255,.5)}

/* EXTRA */
.extra{display:flex;gap:8px;width:100%;animation:fadeUp .5s .25s ease forwards;opacity:0}
.extra-card{flex:1;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:11px 13px;display:flex;align-items:center;gap:9px}
.extra-card svg{width:20px;height:20px;color:rgba(255,255,255,.45);flex-shrink:0}
.extra-label{font-size:9px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:2px}
.extra-val{font-size:17px;font-weight:800}

/* HOURLY */
.hourly-wrap{width:100%;animation:fadeUp .5s .35s ease forwards;opacity:0}
.hourly-title{font-size:9px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:9px;text-align:center}
.hourly{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;width:100%;padding-bottom:2px}
.hourly::-webkit-scrollbar{display:none}
.hour-pill{display:flex;flex-direction:column;align-items:center;gap:6px;padding:12px 14px;border:1px solid var(--border);border-radius:14px;cursor:pointer;transition:.2s;flex-shrink:0;background:var(--card);min-width:64px}
.hour-pill.best{border-color:rgba(0,255,136,.4);background:rgba(0,255,136,.05)}
.hour-pill.active{border-color:rgba(255,255,255,.3);background:rgba(255,255,255,.04)}
.hour-pill.active.best{border-color:rgba(0,255,136,.7)}
.hour-time{font-size:11px;color:var(--muted);font-weight:600}
.hour-dot{width:7px;height:7px;border-radius:50%}
.hour-size{font-size:15px;font-weight:800}
.hour-status{font-size:9px;font-weight:600;letter-spacing:.5px;text-transform:uppercase}

/* WEEK CHART */
.week-wrap{width:100%;animation:fadeUp .5s .3s ease forwards;opacity:0}
.week-title{font-size:9px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;text-align:center}
.week-bars{display:flex;align-items:flex-end;gap:5px;height:56px}
.week-bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;height:100%;justify-content:flex-end;cursor:pointer}
.week-bar{width:100%;border-radius:4px 4px 0 0;min-height:3px;transition:height .7s cubic-bezier(.34,1.1,.64,1),opacity .2s}
.week-bar-lbl{font-size:9px;font-weight:600;text-transform:uppercase;color:var(--muted);transition:.2s}
.week-bar-col.sel .week-bar-lbl{color:#fff}

/* DAYS */
.days{display:flex;gap:5px;width:100%;animation:fadeUp .5s .05s ease forwards;opacity:0}
.day-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;padding:9px 4px 7px;border:1px solid var(--border);border-radius:12px;background:var(--card);cursor:pointer;transition:.2s}
.day-name{font-size:9px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase}
.day-num{font-size:15px;font-weight:700}



/* ALERT FORM in modal */
.alert-form{display:flex;flex-direction:column;gap:18px}
.alert-row{display:flex;align-items:center;justify-content:space-between;gap:16px}
.alert-lbl{font-size:13px;font-weight:600}
.alert-sub{font-size:11px;color:var(--muted);margin-top:3px}
.toggle{position:relative;width:44px;height:24px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0;position:absolute}
.ttrack{position:absolute;inset:0;background:rgba(255,255,255,.1);border-radius:100px;transition:.25s;cursor:pointer}
.toggle input:checked+.ttrack{background:#00ff88}
.tthumb{position:absolute;top:3px;left:3px;width:18px;height:18px;background:#fff;border-radius:50%;transition:.25s;pointer-events:none}
.toggle input:checked~.tthumb{transform:translateX(20px)}
.a-divider{height:1px;background:var(--border)}
.range-block{display:flex;flex-direction:column;gap:8px}
.range-lbl{font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted)}
.range-val-row{display:flex;align-items:baseline;gap:5px}
.rval{font-size:24px;font-weight:800}
.runit{font-size:12px;color:var(--muted)}
input[type=range]{-webkit-appearance:none;width:100%;height:3px;background:rgba(255,255,255,.1);border-radius:2px;outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;background:#00ff88;border-radius:50%;cursor:pointer;transition:.1s}

/* SPOTS */
.spots-wrap{width:100%;animation:fadeUp .5s .42s ease forwards;opacity:0}
.spots-title{font-size:9px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;text-align:center}
.spot-card{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-radius:12px;margin-bottom:6px;border:1px solid var(--border);background:var(--card);transition:.2s}
.spot-card.best{border-color:rgba(0,255,136,.35);background:rgba(0,255,136,.05)}
.spot-card.ok{border-color:rgba(255,209,102,.25);background:rgba(255,209,102,.04)}
.spot-card.bad{opacity:.4}
.spot-left{display:flex;flex-direction:column;gap:3px}
.spot-name{font-size:14px;font-weight:800;letter-spacing:.3px}
.spot-desc{font-size:10px;color:var(--muted);line-height:1.4}
.spot-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px}
.spot-badge{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:3px 8px;border-radius:100px}
.spot-wave{font-size:10px;color:var(--muted)}

/* TIPS */
.tips{width:100%;margin-top:4px;animation:fadeUp .5s .45s ease forwards;opacity:0}
.tips-title{font-size:9px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;text-align:center}
.tip-item{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)}
.tip-item:last-child{border-bottom:none}
.tip-num{font-size:10px;font-weight:700;color:rgba(255,255,255,.2);min-width:14px;margin-top:1px}
.tip-text{font-size:12px;color:rgba(255,255,255,.65);line-height:1.5}

#shareCanvas{display:none;position:absolute;top:-9999px}

@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<!-- TOP BUTTONS -->
<div class="top-btns">

<script>
const LAT=34.263, LON=-6.653;
let M=null, W=null, selDay=0;
let _currentStatus={label:'',color:'#00ff88',fh:0,sc:0,windSpd:0,period:0};

const DAYS=['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
const FDAYS=['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
const MONTHS=['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'];

function getMehdiaHour(){
  const h=new Intl.DateTimeFormat('fr-FR',{timeZone:'Africa/Casablanca',hour:'numeric',hour12:false}).format(new Date());
  const n=parseInt(h); return isNaN(n)?new Date().getHours():n%24;
}
let selHour=getMehdiaHour();

function faceH(houle){return+(houle*0.65).toFixed(1);}

function calcScore(wh,period,wind,windDeg){
  const h=faceH(wh);
  let s=0;
  if(h<0.2)       s=0;
  else if(h<0.4)  s=8;
  else if(h<0.6)  s=18;
  else if(h<0.8)  s=28;
  else if(h<1.0)  s=40;
  else if(h<=1.4) s=62+((h-1.0)/0.4)*18;
  else if(h<=1.8) s=80+((h-1.4)/0.4)*12;
  else if(h<=2.2) s=92-((h-1.8)/0.4)*18;
  else if(h<=3.0) s=74-((h-2.2)/0.8)*35;
  else if(h<=4.0) s=39-((h-3.0)/1.0)*30;
  else            s=Math.max(0,9-(h-4.0)*5);
  if(period>=16)      s=Math.min(100,s+15);
  else if(period>=13) s=Math.min(100,s+8);
  else if(period>=10) s=Math.min(100,s+2);
  else if(period>=8)  s-=8;
  else if(period>=6)  s-=18;
  else                s-=30;
  const isOff=windDeg!==undefined&&(((windDeg-315+540)%360+180)%360-180<-135||((windDeg-315+540)%360+180)%360-180>135);
  if(wind>40)        s-=50;
  else if(wind>30)   s-=35;
  else if(wind>22)   s-=22;
  else if(wind>15)   s-=12;
  else if(wind>10)   s-=5;
  else if(wind<=6&&isOff) s=Math.min(100,s+10);
  else if(wind<=6)   s=Math.min(100,s+4);
  return Math.max(0,Math.min(100,Math.round(s)));
}

function timeSlot(h){
  if(h>=5&&h<12) return 'Matin';
  if(h>=12&&h<15) return 'Midi';
  if(h>=15&&h<20) return 'Après-midi';
  if(h>=20&&h<23) return 'Soirée';
  return null;
}

function getStatus(s,hour,sunTimes,fh){
  if(hour!==undefined){
    if(hour>=22||hour<6)  return {label:'🌙 DODO TIME',    color:'#9b8eff',night:true};
    if(hour>=19&&hour<22) return {label:'🍿 NETFLIX TIME', color:'#b388ff',night:true};
    if(sunTimes){
      const toMin=t=>{const x=new Date(t);return x.getHours()*60+x.getMinutes();};
      const hm=hour*60, rise=toMin(sunTimes.riseRaw), set=toMin(sunTimes.setRaw);
      if(Math.abs(hm-rise)<=60) return {label:'🏃 TRAINING + PETIT DEJ',color:'#ffb347',night:true};
      if(Math.abs(hm-set)<=60)  return {label:'🍿 NETFLIX TIME',color:'#b388ff',night:true};
    }
  }
  if(s>=95&&fh>=2.0) return {label:'🌊 DREAM CONDITIONS',color:'#00ff88'};
  if(s>=90&&fh>=2.0) return {label:'EXCELLENT',color:'#00e5ff'};
  if(s>=90)          return {label:'BON SURF',color:'#7bed9f'};
  if(s>=76&&fh>=2.0) return {label:'BON SURF',color:'#7bed9f'};
  if(s>=60)          return {label:'SURFABLE',color:'#ffd166'};
  if(s>=42)          return {label:'JOUABLE',color:'#ff8c42'};
  if(s>=22)          return {label:'NUL',color:'#ef476f'};
  return             {label:'VA A LA SALLE',color:'#888'};
}

function windLabel(deg){
  const d=((deg-315+540)%360)-180;
  if(Math.abs(d)<45)  return 'ONSHORE';
  if(Math.abs(d)>135) return 'OFFSHORE';
  return ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSO','SO','OSO','O','ONO','NO','NNO'][Math.round(deg/22.5)%16];
}
function wxLabel(c){
  if(c===0) return 'Ensoleillé'; if(c<=2) return 'Peu nuageux';
  if(c<=3)  return 'Couvert';   if(c<=48) return 'Brouillard';
  if(c<=67) return 'Pluie';     return 'Orageux';
}
function hi(d,h){return d*24+h;}

function dayBestScore(d){
  let best=0;
  for(let h=6;h<=20;h++){
    const i=hi(d,h);
    const s=calcScore(M.hourly.wave_height[i]??0,M.hourly.wave_period[i]??8,W.hourly.wind_speed_10m[i]??0,W.hourly.wind_direction_10m?.[i]);
    if(s>best) best=s;
  }
  return best;
}

function dayDominantColor(d){
  const counts={};
  for(let h=6;h<=20;h++){
    const i=hi(d,h);
    const wh=M.hourly.wave_height[i]??0;
    const s=calcScore(wh,M.hourly.wave_period[i]??8,W.hourly.wind_speed_10m[i]??0,W.hourly.wind_direction_10m?.[i]);
    const {color}=getStatus(s,h,null,faceH(wh));
    counts[color]=(counts[color]||0)+1;
  }
  return Object.entries(counts).sort((a,b)=>b[1]-a[1])[0][0];
}

function dayBestHour(d){
  let best=0,bestH=10;
  for(let h=6;h<=19;h++){
    const i=hi(d,h);
    const s=calcScore(M.hourly.wave_height[i]??0,M.hourly.wave_period[i]??8,W.hourly.wind_speed_10m[i]??0,W.hourly.wind_direction_10m?.[i]);
    if(s>best){best=s;bestH=h;}
  }
  return {hour:bestH,score:best};
}

function sunTimes(d){
  try{
    const r=W.daily?.sunrise?.[d],s=W.daily?.sunset?.[d];
    if(!r||!s) return null;
    const f=t=>{const x=new Date(t);return`${String(x.getHours()).padStart(2,'0')}:${String(x.getMinutes()).padStart(2,'0')}`;};
    return {rise:f(r),set:f(s),riseRaw:r,setRaw:s};
  }catch{return null;}
}

async function fetchData(){
  const today=new Date(),end=new Date(today);
  end.setDate(today.getDate()+4);
  const fmt=d=>d.toISOString().split('T')[0];
  const [mr,wr]=await Promise.all([
    fetch(`https://marine-api.open-meteo.com/v1/marine?latitude=${LAT}&longitude=${LON}&hourly=wave_height,wave_period,wave_direction,sea_surface_temperature&start_date=${fmt(today)}&end_date=${fmt(end)}&timezone=Africa/Casablanca`),
    fetch(`https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&current=temperature_2m,wind_speed_10m,wind_direction_10m,weather_code&hourly=temperature_2m,wind_speed_10m,wind_direction_10m,weather_code&daily=sunrise,sunset&start_date=${fmt(today)}&end_date=${fmt(end)}&wind_speed_unit=kmh&timezone=Africa/Casablanca`)
  ]);
  M=await mr.json(); W=await wr.json();
  checkAlerts();
}

async function requestAndTestNotif(){
  if(Notification.permission==='default'){
    const perm=await Notification.requestPermission();
    if(perm!=='granted'){showToast('❌ Notifications refusées');return;}
  }
  if(Notification.permission!=='granted'){showToast('❌ Notifications bloquées dans les réglages');return;}
  document.getElementById('notifToggle').checked=true;
  saveAlertPrefs();
  new Notification('🌊 Mehdia Surf',{body:'Alertes activées ! Tu seras prévenu quand les conditions sont bonnes.',icon:'icon.png'});
  showToast('🔔 Alertes activées !');
  closeModal('alertModal');
}

function checkAlerts(){
  const p=getAlertPrefs();
  if(!p.enabled||!M||!W||Notification.permission!=='granted') return;
  const lastAlert=localStorage.getItem('mehdia_last_alert');
  const now=Date.now();
  if(lastAlert&&now-parseInt(lastAlert)<3600000) return; // max 1 alerte/heure
  for(let dOff=0;dOff<2;dOff++){
    for(let hr=6;hr<=19;hr++){
      const i=hi(dOff,hr);
      const wh=M.hourly.wave_height[i]??0;
      const ws=W.hourly.wind_speed_10m[i]??0;
      const wp=M.hourly.wave_period[i]??8;
      const wd=W.hourly.wind_direction_10m?.[i];
      const sc=calcScore(wh,wp,ws,wd);
      const fh=faceH(wh);
      if(fh>=p.waveMin&&ws<=p.windMax&&sc>=p.scoreMin){
        const {label}=getStatus(sc,hr,null,fh);
        new Notification('🌊 Mehdia Surf',{
          body:`${dOff===0?'Aujourd\'hui':'Demain'} ${String(hr).padStart(2,'0')}h — ${label} · ${fh}m face · vent ${Math.round(ws)} km/h`,
          icon:'icon.png'
        });
        localStorage.setItem('mehdia_last_alert',String(now));
        return;
      }
    }
  }
}

      catch(e){if(e.name!=='AbortError') showToast('Partage annulé');}

      a.href=url; a.download='mehdia-surf.png'; a.click();
      URL.revokeObjectURL(url);
      showToast('📸 Image téléchargée !');
    }
  },'image/png');
}

function angleInRange(angle, min, max) {
  angle = ((angle % 360) + 360) % 360;
  if (min <= max) return angle >= min && angle <= max;
  return angle >= min || angle <= max; // wraps around 360
}

function scoreSpot(spot, windDeg, windSpd, swellDeg, fh) {
  let score = 0;

  // Vent trop fort → mauvais partout
  if (windSpd > spot.windMax) return { rating: 'bad', score: 0 };

  // Vent dans la bonne direction ?
  const windOk = angleInRange(windDeg, spot.windIdeal[0], spot.windIdeal[1]);
  if (windOk) score += 40;
  else if (windSpd < 12) score += 15; // vent léger, direction pas idéale mais ok

  // Houle dans la bonne direction ?
  const swellOk = angleInRange(swellDeg, spot.swellIdeal[0], spot.swellIdeal[1]);
  if (swellOk) score += 40;

  // Taille de vague correcte (0.4m–2.5m face)
  if (fh >= 0.4 && fh <= 2.5) score += 20;
  else if (fh >= 0.3) score += 8;

  const rating = score >= 70 ? 'best' : score >= 40 ? 'ok' : 'bad';
  return { rating, score };
}

function getSpotRecommendations(windDeg, windSpd, swellDeg, fh) {
  return SPOTS
    .map(s => ({ ...s, ...scoreSpot(s, windDeg, windSpd, swellDeg, fh) }))
    .sort((a, b) => b.score - a.score);
}

function typeLabel(type) {
  if (type === 'left')  return '◀ Gauche';
  if (type === 'right') return '▶ Droite';
  return '◆ Pic';
}

      </svg>
      <div class="stat-val">${Math.round(temp)}<span class="unit" style="vertical-align:super;font-size:9px">°</span></div>
      <div class="stat-sub">${wxLabel(wcode)}</div>
    </div>
  </div>

  <div class="extra">
    <div class="extra-card">
      <svg viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M11 2Q14 8 14 13a3 3 0 0 1-6 0Q8 8 11 2Z"/></svg>
      <div><div class="extra-label">Eau</div><div class="extra-val">${seaT!==null?Math.round(seaT):'--'}<span class="unit"> °C</span></div></div>
    </div>
    <div class="extra-card">
      <svg viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round">
        <path d="M3 8Q7 4 11 8Q15 12 19 8"/><path d="M3 14Q7 10 11 14Q15 18 19 14"/>
      </svg>
      <div><div class="extra-label">Période</div><div class="extra-val">${Math.round(period)}<span class="unit"> s</span></div></div>
    </div>
  </div>

  <div class="week-wrap">
    <div class="week-title">Score semaine</div>
    <div class="week-bars">
      ${days.map((day,i)=>`<div class="week-bar-col${i===selDay?' sel':''}" onclick="selDay=${i};selHour=${i===0?getMehdiaHour():10};render()">
        <div class="week-bar" style="height:${Math.max(4,Math.round((day.sc/maxSc)*44))}px;background:${day.color};opacity:${i===selDay?1:.45};${i===selDay?`box-shadow:0 0 10px ${day.color}55`:''};"></div>
        <div class="week-bar-lbl" style="${i===selDay?`color:${day.color}`:''};">${day.name}</div>
      </div>`).join('')}
    </div>
  </div>

  <div class="days">${days.map((day,i)=>`<div class="day-btn${i===selDay?' active':''}" onclick="selDay=${i};selHour=${i===0?getMehdiaHour():10};render()" style="${i===selDay?`border-color:${day.color}66`:''}">
    <div class="day-name" style="color:${day.color}">${day.name}</div>
    <div class="day-num" style="color:${day.color};text-shadow:0 0 12px ${day.color}66">${day.num}</div>
    <svg width="18" height="10" viewBox="0 0 22 10" fill="none" stroke="${day.color}" stroke-width="2" stroke-linecap="round" style="filter:drop-shadow(0 0 4px ${day.color}88)">
      <path d="M1 6c1.5-2 3-3.5 5-3.5s3.5 3 6 3 3.5-3 8-3"/>
    </svg>
  </div>`).join('')}</div>


  <div class="spots-wrap">
    <div class="spots-title">Spots du moment</div>
    ${(()=>{
      const recs=getSpotRecommendations(windDeg,windSpd,swellDeg,fh);
      // N'affiche que best et ok, max 4 spots
      const visible=recs.filter(s=>s.rating!=='bad').slice(0,4);
      if(!visible.length) return `<div style="text-align:center;font-size:12px;color:var(--muted);padding:12px 0">Conditions difficiles sur tous les spots 🤷</div>`;
      return visible.map(s=>`
        <div class="spot-card ${s.rating}">
          <div class="spot-left">
            <div class="spot-name">${s.emoji} ${s.name}</div>
            <div class="spot-desc">${s.desc}</div>
          </div>
          <div class="spot-right">
            <div class="spot-badge" style="background:${s.rating==='best'?'rgba(0,255,136,.15)':'rgba(255,209,102,.12)'};color:${s.rating==='best'?'#00ff88':'#ffd166'}">${s.rating==='best'?'✦ TOP':'OK'}</div>
            <div class="spot-wave">${typeLabel(s.type)}</div>
          </div>
        </div>`).join('');
    })()}
  </div>

  <div class="tips">
    <div class="tips-title">Conseils du jour</div>
    ${getTips().map((t,i)=>`<div class="tip-item"><div class="tip-num">${i+1}</div><div class="tip-text">${t}</div></div>`).join('')}
  </div>

</div>`;

  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    const a=document.getElementById('arc');
    if(a) a.style.strokeDashoffset=dash;
  }));
}

async function init(){
  try{
    await fetchData();
    document.getElementById('loading').style.display='none';
    render();
    loadAlertUI();
    setInterval(async()=>{await fetchData();selHour=getMehdiaHour();render();},3600000);
  }catch(e){
    document.getElementById('app').innerHTML=`<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:16px;padding:40px;text-align:center">
      <div style="font-size:36px">⚠️</div>
      <div style="color:#ef476f;font-size:13px">Erreur de connexion<br><span style="opacity:.5;font-size:11px">${e.message}</span></div>
    </div>`;
  }
}
init();
</script>
</body>
</html>
