<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Podcast Tracker Pro</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#f2f2f7">
    <link rel="apple-touch-icon" href="icon-192.png?v=3">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
    /* ═══════════════════════════════════════════════
       VARIABLES & RESET
    ═══════════════════════════════════════════════ */
    :root {
        --bg:        #f2f2f7;
        --card:      #ffffff;
        --text:      #000000;
        --text-sec:  #8e8e93;
        --green:      #34c759;
        --gray-dot:  #d1d1d6;
        --border:    #e5e5ea;
        --r-lg:      24px;
        --r-sm:      16px;
        --natif:     #82b1ff;
        --integrale: #ffcc80;
        --chronique: #a5d6a7;
        --topbar-h:  62px;
    }
    body.dark {
        --bg:       #000000;
        --card:     #1c1c1e;
        --text:     #ffffff;
        --text-sec: #8e8e98;
        --border:   #38383a;
        --gray-dot: #48484a;
    }
    *, *::before, *::after {
        box-sizing: border-box; margin: 0; padding: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        -webkit-tap-highlight-color: transparent;
    }
    body {
        background: var(--bg); color: var(--text);
        min-height: 100vh;
        transition: background .3s, color .3s;
        overscroll-behavior-y: none;
    }

    /* ═══════════════════════════════════════════════
       TOPBAR DESKTOP
    ═══════════════════════════════════════════════ */
    .topbar { display: none; }

    @media (min-width: 900px) {
        :root { --topbar-h: 72px; }

        .topbar {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            height: var(--topbar-h); padding: 0 28px;
            background: var(--card); border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 300;
            transition: background .3s;
        }

        .topbar-left { display: flex; align-items: center; gap: 6px; }
        .topbar-nav-btn {
            display: flex; align-items: center; gap: 7px;
            padding: 8px 14px; border-radius: 12px; border: none;
            background: var(--bg); color: var(--text-sec);
            font-size: 13px; font-weight: 600; cursor: pointer;
            transition: background .18s, color .18s, box-shadow .18s;
            white-space: nowrap; letter-spacing: -.1px;
        }
        .topbar-nav-btn svg { width: 16px; height: 16px; flex-shrink: 0; }
        .topbar-nav-btn:hover { background: var(--border); color: var(--text); }
        .topbar-nav-btn.active { background: var(--text); color: var(--bg); box-shadow: 0 2px 10px rgba(0,0,0,.12); }

        .topbar-center { display: flex; align-items: center; justify-content: center; }
        .topbar-logo { display: flex; align-items: center; gap: 9px; }
        .topbar-logo-icon {
            width: 34px; height: 34px; border-radius: 10px;
            background: var(--text); display: flex; align-items: center; justify-content: center;
        }
        .topbar-logo-icon svg { width: 18px; height: 18px; color: var(--bg); }
        .topbar-logo-name { font-size: 17px; font-weight: 800; letter-spacing: -.5px; color: var(--text); }
        .topbar-logo-name span { opacity: .35; font-weight: 500; }

        .topbar-right { display: flex; align-items: center; gap: 8px; justify-content: flex-end; }
        .topbar-search {
            display: flex; align-items: center; gap: 8px;
            background: var(--bg); border-radius: 22px;
            padding: 8px 14px; width: 220px;
            border: 1.5px solid transparent;
            transition: all .25s;
        }
        .topbar-search:focus-within { border-color: var(--border); width: 280px; }
        .topbar-search input { flex: 1; border: none; outline: none; font-size: 13px; background: transparent; color: var(--text); }
    }

    /* ═══════════════════════════════════════════════
       LAYOUT PRINCIPAL
    ═══════════════════════════════════════════════ */
    .layout { width: 100%; max-width: 440px; margin: 0 auto; padding: 20px 20px 100px; display: flex; flex-direction: column; }
    #stats-zone, #list-zone { display: flex; flex-direction: column; gap: 20px; }

    @media (min-width: 900px) {
        .layout { max-width: 1280px; padding: 0; display: grid; grid-template-columns: 420px 1fr; }
        .col-left { position: sticky; top: var(--topbar-h); height: calc(100vh - var(--topbar-h)); overflow-y: auto; padding: 24px 24px 0 40px; border-right: 1px solid var(--border); display: flex; flex-direction: column; gap: 16px; }
        .col-right { height: calc(100vh - var(--topbar-h)); overflow-y: auto; padding: 28px 40px 40px 28px; }
    }

    /* ═══════════════════════════════════════════════
       COMPOSANTS (CHART, LIST, MODALS, etc)
    ═══════════════════════════════════════════════ */
    .mobile-only { display: flex; }
    .desktop-only { display: none; }
    @media (min-width: 900px) { .mobile-only { display: none !important; } .desktop-only { display: flex; } }

    .filter-wrap { position: relative; flex-shrink: 1; min-width: 0; }
    .filter-select { appearance: none; background: var(--card); border: none; padding: 10px 32px 10px 16px; border-radius: 20px; font-weight: 600; color: var(--text); cursor: pointer; width: 100%; }
    .filter-chevron { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); pointer-events: none; width: 12px; color: var(--text); }

    .chart-card { background: var(--card); border-radius: var(--r-lg); padding: 20px 20px 36px; box-shadow: 0 2px 16px rgba(0,0,0,.06); transition: background .3s; }
    .chart-total { font-size: 38px; font-weight: 800; letter-spacing: -2px; margin-bottom: 22px; }
    .chart-area { position: relative; height: 140px; display: flex; align-items: flex-end; }
    .bar { width: 18px; background: var(--text); border-radius: 4px 4px 0 0; transition: height .5s ease; position: relative; }
    .bar-col { display: flex; flex-direction: column; align-items: center; flex: 1; height: 100%; justify-content: flex-end; }

    .podcast-list { background: var(--card); border-radius: var(--r-lg); padding: 10px 20px; box-shadow: 0 4px 20px rgba(0,0,0,.04); }
    .podcast-item { display: flex; align-items: center; padding: 16px 12px; border-bottom: 1px solid var(--bg); cursor: pointer; border-radius: 12px; }
    .podcast-img { width: 48px; height: 48px; border-radius: 12px; margin-right: 16px; flex-shrink: 0; object-fit: cover; }
    .podcast-info { flex: 1; overflow: hidden; }
    .podcast-name { font-size: 16px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* ═══════════════════════════════════════════════
       LECTEUR AUDIO (MODAL)
    ═══════════════════════════════════════════════ */
    .player-modal { display: none; position: fixed; inset: 0; background: rgba(20,20,20,.88); backdrop-filter: blur(28px); z-index: 1000; flex-direction: column; align-items: center; color: #fff; }
    .player-modal.open { display: flex; }
    .player-inner { width: 100%; max-width: 440px; display: flex; flex-direction: column; align-items: center; padding: 20px; }
    .player-cover { width: 260px; height: 260px; border-radius: 22px; object-fit: cover; box-shadow: 0 20px 60px rgba(0,0,0,0.6); margin-bottom: 24px; }
    .player-controls { width: 100%; display: flex; flex-direction: column; gap: 16px; }
    
    .progress-slider { width: 100%; -webkit-appearance: none; height: 5px; border-radius: 3px; background: rgba(255,255,255,0.2); outline: none; }
    .progress-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%; background: #fff; cursor: pointer; }

    .btn-playpause { width: 70px; height: 70px; border-radius: 50%; background: #fff; color: #000; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    .speed-btn { padding: 5px 11px; border-radius: 20px; border: none; font-size: 12px; font-weight: 700; background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.55); cursor: pointer; }
    .speed-btn.active { background: #fff; color: #000; }

    /* ═══════════════════════════════════════════════
       MINI PLAYER & OTHERS
    ═══════════════════════════════════════════════ */
    .mini-player { display: none; position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: calc(100% - 32px); max-width: 420px; background: var(--card); border-radius: 20px; padding: 10px; box-shadow: 0 8px 32px rgba(0,0,0,0.12); z-index: 350; align-items: center; gap: 10px; cursor: pointer; border: 1px solid var(--border); }
    .mini-player.visible { display: flex; }
    .mini-cover { width: 44px; height: 44px; border-radius: 12px; object-fit: cover; }
    .mini-info { flex: 1; overflow: hidden; }

    /* Goal Card */
    .goal-card { background: var(--card); border-radius: var(--r-lg); padding: 16px 18px; box-shadow: 0 2px 16px rgba(0,0,0,.06); display: flex; flex-direction: column; gap: 10px; }
    .goal-bar-bg { width: 100%; height: 8px; background: var(--bg); border-radius: 4px; overflow: hidden; }
    .goal-bar-fill { height: 100%; background: var(--green); transition: width 0.6s ease; }

    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 400; align-items: flex-end; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal-box { background: var(--bg); width: 100%; max-height: 88vh; border-radius: 20px 20px 0 0; padding: 20px; overflow-y: auto; }

    /* Silence Radio */
    .silence-title { font-size: 12px; font-weight: 700; color: #ff9500; text-transform: uppercase; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
    .silence-list { background: var(--card); border-radius: var(--r-sm); overflow: hidden; }
    .silence-item { display: flex; align-items: center; gap: 12px; padding: 10px 14px; border-bottom: 1px solid var(--bg); cursor: pointer; }

    /* Badges */
    .resume-badge { display: none; align-items: center; gap: 6px; padding: 7px 14px; border-radius: 12px; margin-bottom: 10px; background: rgba(52,199,89,.15); color: var(--green); font-size: 12px; font-weight: 600; cursor: pointer; border: 1px solid rgba(52,199,89,.25); width: 100%; }
    .resume-badge.show { display: flex; }
    </style>
</head>
<body>

<div class="topbar" id="topbar">
    <div class="topbar-left">
        <button class="topbar-nav-btn" onclick="openPlayer()">Lecteur</button>
        <button class="topbar-nav-btn" onclick="openHistory()">Calendrier</button>
        <button class="topbar-nav-btn" onclick="openSettings()">Paramètres</button>
    </div>
    <div class="topbar-center">
        <div class="topbar-logo">
            <div class="topbar-logo-icon">🎙️</div>
            <span class="topbar-logo-name">Podcast<span>Tracker</span></span>
        </div>
    </div>
    <div class="topbar-right">
        <select id="filter-desktop" class="filter-select" onchange="syncFilter('desktop')" style="width:150px">
            <option value="all">Tous</option>
            <option value="comptabilise">Comptabilisés</option>
            <option value="natif">Natifs</option>
        </select>
        <div class="topbar-search">
            <input id="search-desktop" type="text" placeholder="Rechercher…" oninput="updateView()">
        </div>
    </div>
</div>

<div class="layout" id="layout">
    <header class="mobile-header mobile-only" style="display:flex; justify-content: space-between; margin-bottom: 20px;">
        <select id="filter-mobile" class="filter-select" onchange="syncFilter('mobile')" style="width: 60%">
            <option value="all">Tous les flux</option>
            <option value="comptabilise">Comptabilisés</option>
        </select>
        <div class="icon-group" style="display:flex; gap:15px;">
            <span onclick="openPlayer()">🎧</span>
            <span onclick="openSettings()">⚙️</span>
        </div>
    </header>

    <div class="col-left" id="col-left">
        <div id="stats-zone"></div>
    </div>

    <div class="col-right" id="col-right">
        <div id="list-zone">
            <div id="loading-box" style="text-align:center; padding: 50px;">Synchronisation...</div>
        </div>
    </div>
</div>

<div class="mini-player" id="mini-player" onclick="openPlayer()">
    <img id="mini-cover" class="mini-cover" src="" alt="">
    <div class="mini-info">
        <div id="mini-title" style="font-weight:700; font-size:13px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">–</div>
        <div id="mini-podcast" style="font-size:11px; color:gray;">–</div>
    </div>
    <button onclick="event.stopPropagation(); togglePlay();" style="border:none; background:none; font-size:20px;">⏯️</button>
</div>

<div class="player-modal" id="player-modal">
    <div class="player-inner">
        <button onclick="closePlayer()" style="align-self:flex-end; background:none; border:none; color:white; font-size:24px;">✕</button>
        <img id="player-cover" class="player-cover" src="" alt="">
        <h2 id="player-title" style="text-align:center; margin-bottom:5px;">–</h2>
        <p id="player-podcast-name" style="color:gray; margin-bottom:20px;">–</p>
        
        <div class="player-controls">
            <button class="resume-badge" id="resume-badge" onclick="resumePosition()">
                Reprendre à <span id="resume-time">0:00</span>
            </button>
            
            <input id="player-progress" type="range" class="progress-slider" value="0">
            <div style="display:flex; justify-content:space-between; font-size:12px;">
                <span id="time-current">0:00</span>
                <span id="time-total">0:00</span>
            </div>

            <div style="display:flex; justify-content:space-around; align-items:center;">
                <button onclick="seekAudio(-15)" style="background:none; border:none; color:white; font-size:24px;">⏪</button>
                <button class="btn-playpause" onclick="togglePlay()" id="main-play-btn">▶️</button>
                <button onclick="seekAudio(15)" style="background:none; border:none; color:white; font-size:24px;">⏩</button>
            </div>

            <div style="display:flex; justify-content:center; gap:10px; margin-top:20px;">
                <button class="speed-btn" onclick="setSpeed(1)">1x</button>
                <button class="speed-btn" onclick="setSpeed(1.5)">1.5x</button>
                <button class="speed-btn" onclick="setSpeed(2)">2x</button>
                <button id="sleep-btn" class="speed-btn" onclick="toggleSleepTimer()">🌙 Sommeil</button>
            </div>
        </div>
    </div>
</div>

<div class="modal-overlay" id="settings-modal">
    <div class="modal-box">
        <h3>Paramètres</h3>
        <div style="margin: 20px 0;">
            <label>Mode Sombre <input type="checkbox" id="dark-toggle" onchange="toggleDarkMode()"></label>
        </div>
        <button onclick="closeModal('settings-modal')" style="width:100%; padding:10px; border-radius:10px; border:none; background:black; color:white;">Fermer</button>
    </div>
</div>

<audio id="audio"></audio>

<script>
/* ═══════════════════════════════════════════════
   LOGIQUE JS INTEGRÉE
═══════════════════════════════════════════════ */
const DEFAULT_CONFIG = [
    { url:"https://feeds.audiomeans.fr/feed/17652c76-f6e2-47da-b4de-ab791a8de6f9.xml", comptabilise:true, natif:false },
    { url:"https://feeds.audiomeans.fr/feed/b38cbcd5-a1b8-4f4c-997a-d40c2c04f9e8.xml", comptabilise:true, natif:false },
    { url:"https://feeds.audiomeans.fr/feed/1c147c6c-b4f0-46ae-a101-d0436ffa3d0e.xml", comptabilise:true, natif:true }
];

let podcastConfig = JSON.parse(localStorage.getItem('podcastConfig')) || DEFAULT_CONFIG;
let allData = [], historyData = [];
let trackIdx = -1, queue = [];
let favorites = JSON.parse(localStorage.getItem('favorites') || '[]');
let currentSpeed = parseFloat(localStorage.getItem('playbackSpeed') || '1');
let savedPositions = JSON.parse(localStorage.getItem('savedPositions') || '{}');
let sleepTimeout = null;

const audio = document.getElementById('audio');
const BLANK = "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiPjxyZWN0IHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiIGZpbGw9IiMzMzMiLz48L3N2Zz4=";

const today = new Date(); today.setHours(0,0,0,0);
const DAYS = Array.from({length:9},(_,i)=>{ const d=new Date(today); d.setDate(d.getDate()-(8-i)); return d.getTime(); });

function initApp() {
    if(localStorage.getItem('darkMode') === 'true') { document.body.classList.add('dark'); }
    loadCache();
    fetchFeeds();
    
    audio.addEventListener('timeupdate', onTimeUpdate);
    audio.addEventListener('ended', () => { playNext(); });
    audio.addEventListener('play', updateMediaSession);

    // Sauvegarde en cas de fermeture brutale (Amélioration 4)
    window.addEventListener('beforeunload', saveCurrentPosition);
}

async function fetchFeeds() {
    const tPods = [], tHist = [];
    for(const cfg of podcastConfig) {
        try {
            const res = await fetch(`https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(cfg.url)}`);
            const text = await res.text();
            const xml = new DOMParser().parseFromString(text, 'text/xml');
            const items = [...xml.querySelectorAll('item')];
            const title = xml.querySelector('channel > title')?.textContent || 'Inconnu';
            const img = xml.querySelector('channel > image > url')?.textContent || '';

            const counts = {}; DAYS.forEach(d => counts[d] = 0);
            
            items.forEach(item => {
                const pubDate = new Date(item.querySelector('pubDate').textContent);
                const dayTs = new Date(pubDate).setHours(0,0,0,0);
                if(counts[dayTs] !== undefined) {
                    counts[dayTs]++;
                    tHist.push({
                        podcast: title,
                        title: item.querySelector('title').textContent,
                        url: item.querySelector('enclosure').getAttribute('url'),
                        image: img,
                        date: pubDate
                    });
                }
            });

            tPods.push({
                name: title,
                url: cfg.url,
                image: img,
                comptabilise: cfg.comptabilise,
                natif: cfg.natif,
                dailyCounts: counts,
                latestTitle: items[0]?.querySelector('title').textContent
            });
        } catch(e) { console.error(e); }
    }
    allData = tPods;
    historyData = tHist.sort((a,b) => b.date - a.date);
    saveCache(allData, historyData);
    updateView();
}

function updateView() {
    const listZone = document.getElementById('list-zone');
    let html = '<div class="podcast-list">';
    allData.forEach(p => {
        html += `
            <div class="podcast-item" onclick="setupPlayer('${p.url}')">
                <img src="${p.image || BLANK}" class="podcast-img">
                <div class="podcast-info">
                    <div class="podcast-name">${p.name}</div>
                    <div style="font-size:12px; color:gray;">${p.latestTitle}</div>
                </div>
                <div style="font-weight:bold;">${p.dailyCounts[DAYS[8]] || 0}</div>
            </div>`;
    });
    listZone.innerHTML = html + '</div>';
    renderStats();
}

function renderStats() {
    let total = 0;
    allData.forEach(p => { if(p.comptabilise) total += (p.dailyCounts[DAYS[8]] || 0); });
    document.getElementById('stats-zone').innerHTML = `
        <div class="chart-card">
            <div style="font-size:12px; color:gray;">Aujourd'hui</div>
            <div class="chart-total">${total}</div>
            <div class="goal-card">
                <div style="font-size:11px; font-weight:700;">OBJECTIF QUOTIDIEN (10)</div>
                <div class="goal-bar-bg"><div class="goal-bar-fill" style="width:${Math.min(total*10, 100)}%"></div></div>
            </div>
        </div>
    `;
}

/* ═══ LECTEUR & MEDIA SESSION (Amélioration 1) ═══ */
function setupPlayer(feedUrl) {
    const ep = historyData.find(h => h.podcast === allData.find(d => d.url === feedUrl).name);
    if(!ep) return;
    queue = historyData.slice(0, 50); // Prend les 50 derniers épisodes
    trackIdx = queue.findIndex(q => q.url === ep.url);
    loadTrack(trackIdx);
    openPlayer();
}

function loadTrack(idx) {
    const t = queue[idx];
    audio.src = t.url;
    audio.playbackRate = currentSpeed;
    document.getElementById('player-title').textContent = t.title;
    document.getElementById('player-podcast-name').textContent = t.podcast;
    document.getElementById('player-cover').src = t.image || BLANK;
    
    // Mini player
    document.getElementById('mini-title').textContent = t.title;
    document.getElementById('mini-podcast').textContent = t.podcast;
    document.getElementById('mini-cover').src = t.image || BLANK;
    document.getElementById('mini-player').classList.add('visible');

    // Reprise (Amélioration 4)
    const saved = savedPositions[t.url];
    const badge = document.getElementById('resume-badge');
    if(saved > 5) {
        document.getElementById('resume-time').textContent = fmt(saved);
        badge.classList.add('show');
    } else { badge.classList.remove('show'); }
}

function updateMediaSession() {
    if ('mediaSession' in navigator && trackIdx >= 0) {
        const t = queue[trackIdx];
        navigator.mediaSession.metadata = new MediaMetadata({
            title: t.title,
            artist: t.podcast,
            artwork: [{ src: t.image || BLANK, sizes: '512x512', type: 'image/png' }]
        });
        navigator.mediaSession.setActionHandler('play', () => audio.play());
        navigator.mediaSession.setActionHandler('pause', () => audio.pause());
    }
}

function togglePlay() { 
    if(audio.paused) { audio.play(); document.getElementById('main-play-btn').textContent = '⏸️'; }
    else { audio.pause(); document.getElementById('main-play-btn').textContent = '▶️'; }
}

function onTimeUpdate() {
    const pct = (audio.currentTime / audio.duration) * 100;
    document.getElementById('player-progress').value = pct || 0;
    document.getElementById('time-current').textContent = fmt(audio.currentTime);
    document.getElementById('time-total').textContent = fmt(audio.duration);
}

function seekAudio(sec) { audio.currentTime += sec; }
function setSpeed(s) { currentSpeed = s; audio.playbackRate = s; localStorage.setItem('playbackSpeed', s); }

/* ═══ SLEEP TIMER (Amélioration 2) ═══ */
function toggleSleepTimer() {
    if (sleepTimeout) {
        clearTimeout(sleepTimeout);
        sleepTimeout = null;
        document.getElementById('sleep-btn').style.background = "rgba(255,255,255,0.1)";
        document.getElementById('sleep-btn').textContent = "🌙 Sommeil";
    } else {
        const mins = prompt("Couper le son dans combien de minutes ?", "30");
        if (mins) {
            document.getElementById('sleep-btn').style.background = "var(--green)";
            document.getElementById('sleep-btn').textContent = mins + "m";
            sleepTimeout = setTimeout(() => {
                audio.pause();
                toggleSleepTimer();
            }, mins * 60000);
        }
    }
}

/* ═══ CACHE & FERMETURE (Améliorations 3 & 4) ═══ */
function saveCache(p, h) {
    // On limite à 150 entrées d'historique pour la performance
    localStorage.setItem('podcastsDataCache', JSON.stringify({ podcasts: p, history: h.slice(0, 150) }));
}

function loadCache() {
    const data = JSON.parse(localStorage.getItem('podcastsDataCache'));
    if(data) { allData = data.podcasts; historyData = data.history; updateView(); }
}

function saveCurrentPosition() {
    if(trackIdx >= 0 && audio.currentTime > 5) {
        savedPositions[queue[trackIdx].url] = audio.currentTime;
        localStorage.setItem('savedPositions', JSON.stringify(savedPositions));
    }
}

function resumePosition() {
    audio.currentTime = savedPositions[queue[trackIdx].url] || 0;
    audio.play();
    document.getElementById('resume-badge').classList.remove('show');
}

/* ═══ UTILS ═══ */
function fmt(s) { if(isNaN(s)) return '0:00'; return Math.floor(s/60) + ':' + String(Math.floor(s%60)).padStart(2,'0'); }
function openPlayer() { document.getElementById('player-modal').classList.add('open'); }
function closePlayer() { document.getElementById('player-modal').classList.remove('open'); }
function openSettings() { document.getElementById('settings-modal').classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function toggleDarkMode() { document.body.classList.toggle('dark'); localStorage.setItem('darkMode', document.body.classList.contains('dark')); }

initApp();
</script>
