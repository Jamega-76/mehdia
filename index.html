
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mehdia Surf Report</title>

<link rel="icon" type="image/png" sizes="192x192" href="icon.png">
<link rel="shortcut icon" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">
<link rel="apple-touch-icon" sizes="180x180" href="icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mehdia Surf">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --neon: #00ff88;
    --bg: #000000;
    --muted: rgba(255,255,255,0.45);
    --divider: rgba(255,255,255,0.1);
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: #fff;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    overflow-x: hidden;
  }

  /* LOADING */
  #loading {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 100vh; gap: 20px;
  }
  .loader {
    width: 50px; height: 50px;
    border: 2px solid rgba(0,255,136,0.15);
    border-top-color: var(--neon);
    border-radius: 50%;
    animation: spin 1s linear infinite;
    filter: drop-shadow(0 0 8px var(--neon));
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text {
    font-size: 11px; color: var(--muted);
    letter-spacing: 3px; text-transform: uppercase;
    animation: pulse 1.5s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:0.3} 50%{opacity:1} }

  /* SCREEN */
  .screen {
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: space-between;
    padding: 60px 28px 40px;
    max-width: 420px; margin: 0 auto;
    gap: 28px;
  }

  /* HEADER */
  .header { text-align: center; animation: fadeUp 0.5s ease forwards; opacity: 0; }
  .header h1 { font-size: 26px; font-weight: 700; letter-spacing: -0.3px; margin-bottom: 6px; }
  .header .datetime { font-size: 15px; font-weight: 400; color: var(--muted); }

  /* RING */
  .ring-section { animation: fadeUp 0.5s 0.1s ease forwards; opacity: 0; }
  .ring-wrapper { position: relative; width: 250px; height: 250px; }
  .ring-svg { width: 250px; height: 250px; transform: rotate(-90deg); }
  .ring-track { fill: none; stroke: rgba(255,255,255,0.07); stroke-width: 5; }
  .ring-arc {
    fill: none; stroke-width: 5; stroke-linecap: round;
    stroke-dasharray: 691; stroke-dashoffset: 691;
    transition: stroke-dashoffset 1.8s cubic-bezier(0.34, 1.1, 0.64, 1);
  }
  .ring-center {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center; padding: 30px;
  }
  .ring-label {
    font-size: 28px; font-weight: 900;
    letter-spacing: 3px; text-transform: uppercase;
    line-height: 1; margin-bottom: 10px;
  }
  .ring-sub { font-size: 13px; font-weight: 400; color: rgba(255,255,255,0.7); }

  /* STATS */
  .stats-row {
    display: flex; align-items: stretch; width: 100%;
    animation: fadeUp 0.5s 0.2s ease forwards; opacity: 0;
  }
  .stat {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; gap: 8px; padding: 4px 0;
  }
  .stat-divider { width: 1px; background: var(--divider); margin: 6px 0; }
  .stat-icon { width: 30px; height: 30px; color: rgba(255,255,255,0.55); }
  .stat-value { font-size: 25px; font-weight: 800; color: #fff; line-height: 1; letter-spacing: -1px; }
  .stat-value .unit { font-size: 12px; font-weight: 500; color: rgba(255,255,255,0.55); letter-spacing: 0; }
  .stat-sub { font-size: 10px; font-weight: 500; color: var(--muted); letter-spacing: 0.8px; text-transform: uppercase; text-align: center; }

  /* WIND ARROW */
  .wind-arrow {
    width: 28px; height: 28px;
    transition: transform 0.8s cubic-bezier(0.34, 1.2, 0.64, 1);
    color: rgba(255,255,255,0.55);
  }

  /* TIDE CARD */
  .tide-card {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    animation: fadeUp 0.5s 0.3s ease forwards; opacity: 0;
  }
  .tide-left {
    display: flex; align-items: center; gap: 14px;
  }
  .tide-icon { font-size: 26px; }
  .tide-label { font-size: 11px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
  .tide-status { font-size: 18px; font-weight: 800; color: #fff; }
  .tide-right { text-align: right; }
  .tide-next-label { font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px; }
  .tide-next-time { font-size: 20px; font-weight: 800; color: #fff; }
  .tide-next-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }

  /* HOURLY */
  .hourly {
    display: flex; gap: 8px;
    overflow-x: auto; scrollbar-width: none;
    width: 100%;
    animation: fadeUp 0.5s 0.4s ease forwards; opacity: 0;
    padding-bottom: 2px;
  }
  .hourly::-webkit-scrollbar { display: none; }
  .hour-pill {
    display: flex; align-items: center; gap: 6px;
    padding: 8px 14px;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 100px;
    white-space: nowrap;
    font-size: 13px; color: rgba(255,255,255,0.55);
    font-weight: 500; cursor: pointer;
    transition: all 0.2s; flex-shrink: 0;
  }
  .hour-pill:hover { border-color: rgba(255,255,255,0.22); color: #fff; }
  .hour-pill.active { border-color: rgba(0,255,136,0.35); background: rgba(0,255,136,0.05); color: #fff; }
  .hour-time { color: var(--muted); font-size: 12px; }
  .hour-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .dot-green  { background: #00ff88; box-shadow: 0 0 6px #00ff88; }
  .dot-orange { background: #ff8c42; box-shadow: 0 0 6px #ff8c42; }
  .dot-red    { background: #ef476f; box-shadow: 0 0 6px #ef476f; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
<div id="app">
  <div id="loading">
    <div class="loader"></div>
    <div class="loading-text">Chargement des vagues…</div>
  </div>
</div>

<script>
const LAT = 34.263;
const LON = -6.653;
const STORMGLASS_KEY = 'ba979f76-1107-11f1-b7ff-0242ac120004-ba979fd0-1107-11f1-b7ff-0242ac120004';
const FULL_DAYS = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
const MONTHS = ['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'];

let marineData = null;
let weatherData = null;
let tideData = null;
let selectedDay = 0;
let selectedHour = new Date().getHours();

// ======== SURF SCORE ========
function calcSurfScore(waveH, period, windSpeed) {
  let s = 0;
  if (waveH < 0.3) s = 10;
  else if (waveH < 0.6) s = 30 + (waveH/0.6)*20;
  else if (waveH <= 1.5) s = 55 + ((waveH-0.6)/0.9)*30;
  else if (waveH <= 2.5) s = 85 + ((waveH-1.5)/1.0)*10;
  else if (waveH <= 3.5) s = 95 - ((waveH-2.5)/1.0)*20;
  else s = Math.max(20, 75 - (waveH-3.5)*15);
  if (period >= 14) s = Math.min(100, s + 8);
  else if (period >= 10) s = Math.min(100, s + 4);
  else if (period < 6) s -= 10;
  if (windSpeed > 30) s -= 20;
  else if (windSpeed > 20) s -= 12;
  else if (windSpeed > 15) s -= 6;
  else if (windSpeed < 8) s = Math.min(100, s + 5);
  return Math.max(0, Math.min(100, Math.round(s)));
}

function getLabel(score) {
  if (score >= 65) return { label: 'EXCELLENT', desc: 'Vagues glassy, foncez !', color: '#00ff88' };
  if (score >= 35) return { label: 'MOYEN',     desc: 'Conditions passables',    color: '#ff8c42' };
  return              { label: 'MAUVAIS',    desc: 'Peu recommandé',          color: '#ef476f' };
}

function getDotClass(score) {
  if (score >= 65) return 'dot-green';
  if (score >= 35) return 'dot-orange';
  return 'dot-red';
}

// ======== WIND ========
function windQuality(deg) {
  const beach = 315;
  const diff = ((deg - beach + 540) % 360) - 180;
  const dirs = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSO','SO','OSO','O','ONO','NO','NNO'];
  if (Math.abs(diff) < 45) return 'ONSHORE';
  if (Math.abs(diff) > 135) return 'OFFSHORE';
  return dirs[Math.round(deg/22.5) % 16];
}

// ======== WEATHER ========
function getWeatherLabel(code) {
  if (code === 0) return 'Ensoleillé';
  if (code <= 2)  return 'Peu nuageux';
  if (code <= 3)  return 'Couvert';
  if (code <= 48) return 'Brouillard';
  if (code <= 57) return 'Bruine';
  if (code <= 67) return 'Pluie';
  return 'Orageux';
}

// ======== TIDE HELPERS ========
function getTideInfo(targetDate) {
  if (!tideData || !tideData.data || tideData.data.length === 0) return null;

  const now = targetDate || new Date();
  const extremes = tideData.data.map(e => ({
    time: new Date(e.time),
    type: e.type, // 'high' or 'low'
    height: e.height
  })).sort((a, b) => a.time - b.time);

  // Find the previous and next extreme relative to now
  const past = extremes.filter(e => e.time <= now);
  const future = extremes.filter(e => e.time > now);

  const prev = past[past.length - 1];
  const next = future[0];

  if (!next) return null;

  // Determine if tide is rising or falling
  let isMontante = true;
  if (prev && next) {
    isMontante = next.type === 'high';
  }

  const diffMs = next.time - now;
  const diffH = Math.floor(diffMs / 3600000);
  const diffM = Math.floor((diffMs % 3600000) / 60000);
  const timeStr = `${String(next.time.getHours()).padStart(2,'0')}:${String(next.time.getMinutes()).padStart(2,'0')}`;
  const inStr = diffH > 0 ? `dans ${diffH}h${diffM > 0 ? diffM : ''}` : `dans ${diffM}min`;

  return {
    isMontante,
    nextType: next.type,
    nextTime: timeStr,
    nextIn: inStr,
    nextHeight: next.height ? next.height.toFixed(1) : null
  };
}

function getHI(day, hour) { return day * 24 + hour; }

// ======== FETCH ========
async function fetchData() {
  const today = new Date();
  const end = new Date(today); end.setDate(today.getDate() + 4);
  const fmt = d => d.toISOString().split('T')[0];

  // Stormglass tide — fetch separately, don't block if it fails
  const tideStart = Math.floor(today.getTime() / 1000);
  const tideEnd = Math.floor(end.getTime() / 1000);

  const [mRes, wRes] = await Promise.all([
    fetch(`https://marine-api.open-meteo.com/v1/marine?latitude=${LAT}&longitude=${LON}&hourly=wave_height,wave_period,wave_direction&start_date=${fmt(today)}&end_date=${fmt(end)}&timezone=Africa/Casablanca`),
    fetch(`https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&current=temperature_2m,wind_speed_10m,wind_direction_10m,weather_code&hourly=temperature_2m,wind_speed_10m,wind_direction_10m,weather_code&start_date=${fmt(today)}&end_date=${fmt(end)}&wind_speed_unit=kmh&timezone=Africa/Casablanca`)
  ]);
  marineData = await mRes.json();
  weatherData = await wRes.json();

  // Fetch tides (non-blocking)
  try {
    const tRes = await fetch(
      `https://api.stormglass.io/v2/tide/extremes/point?lat=${LAT}&lng=${LON}&start=${tideStart}&end=${tideEnd}`,
      { headers: { 'Authorization': STORMGLASS_KEY } }
    );
    tideData = await tRes.json();
  } catch(e) {
    tideData = null;
  }
}

// ======== RENDER ========
function render() {
  const now = new Date();
  const hi = getHI(selectedDay, selectedHour);

  const waveH   = marineData.hourly.wave_height[hi] ?? 0;
  const period   = marineData.hourly.wave_period[hi] ?? 8;
  const windSpd  = weatherData.hourly.wind_speed_10m[hi] ?? 0;
  const windDir  = weatherData.hourly.wind_direction_10m?.[hi] ?? weatherData.current.wind_direction_10m ?? 0;
  const temp     = weatherData.hourly.temperature_2m[hi] ?? weatherData.current.temperature_2m ?? 0;
  const wcode    = weatherData.hourly.weather_code[hi] ?? weatherData.current.weather_code ?? 0;

  const score = calcSurfScore(waveH, period, windSpd);
  const { label, desc, color } = getLabel(score);

  // Datetime
  const d = new Date(now); d.setDate(d.getDate() + selectedDay);
  const dateStr = `${FULL_DAYS[d.getDay()]} ${d.getDate()} ${MONTHS[d.getMonth()]}, ${String(selectedHour).padStart(2,'0')}:00`;

  // Tide info (use selected day/hour context)
  const tideRef = new Date(now);
  tideRef.setDate(now.getDate() + selectedDay);
  tideRef.setHours(selectedHour, 0, 0, 0);
  const tide = getTideInfo(tideRef);

  // Hourly pills
  const startH = selectedDay === 0 ? now.getHours() : 8;
  const hours = Array.from({length: 5}, (_, i) => {
    const absH = startH + i * 2;
    const dayOffset = Math.floor(absH / 24);
    const h = absH % 24;
    const day = selectedDay + dayOffset;
    const idx = getHI(day, h);
    const wh = marineData.hourly.wave_height[idx] ?? 0;
    const ws = weatherData.hourly.wind_speed_10m[idx] ?? 0;
    const wp = marineData.hourly.wave_period[idx] ?? 8;
    return { h, wh, sc: calcSurfScore(wh, wp, ws), isNextDay: dayOffset > 0 };
  });

  // Ring: r=110 → C = 2π×110 ≈ 691
  const circum = 2 * Math.PI * 110;
  const dash = circum - (score / 100) * circum;

  // Wind arrow rotation (direction du vent = d'où il vient, on tourne la flèche)
  const arrowRot = windDir;

  // Tide HTML
  let tideHTML = '';
  if (tide) {
    const icon = tide.isMontante ? '🌊' : '🏖️';
    const statusText = tide.isMontante ? 'Montante' : 'Descendante';
    const nextLabel = tide.nextType === 'high' ? 'Pleine mer' : 'Basse mer';
    tideHTML = `
    <div class="tide-card">
      <div class="tide-left">
        <div class="tide-icon">${icon}</div>
        <div>
          <div class="tide-label">Marée</div>
          <div class="tide-status">${statusText}</div>
        </div>
      </div>
      <div class="tide-right">
        <div class="tide-next-label">${nextLabel} à</div>
        <div class="tide-next-time">${tide.nextTime}</div>
        <div class="tide-next-sub">${tide.nextIn}${tide.nextHeight ? ' · ' + tide.nextHeight + 'm' : ''}</div>
      </div>
    </div>`;
  }

  document.getElementById('app').innerHTML = `
  <div class="screen">

    <div class="header">
      <h1>Mehdia Plage</h1>
      <div class="datetime">${dateStr}</div>
    </div>

    <div class="ring-section">
      <div class="ring-wrapper">
        <svg class="ring-svg" viewBox="0 0 250 250">
          <circle class="ring-track" cx="125" cy="125" r="110"/>
          <circle class="ring-arc" id="ringArc" cx="125" cy="125" r="110"
            stroke="${color}"
            style="stroke-dashoffset:${circum}; filter: drop-shadow(0 0 16px ${color}) drop-shadow(0 0 40px ${color}88)"/>
        </svg>
        <div class="ring-center">
          <div class="ring-label" style="color:${color}; text-shadow: 0 0 50px ${color}">${label}</div>
          <div class="ring-sub">${desc}</div>
        </div>
      </div>
    </div>

    <div class="stats-row">
      <!-- Vagues -->
      <div class="stat">
        <svg class="stat-icon" viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 20c2-3 4-5 7-5s5 4 9 4 5-4 12-4"/>
          <path d="M2 26c2-3 4-5 7-5s5 4 9 4 5-4 12-4"/>
          <path d="M13 6 Q16 2 19 6 Q22 10 19 14 Q16 18 13 14 Q10 10 13 6Z" stroke-width="1.5"/>
        </svg>
        <div class="stat-value">${waveH.toFixed(1)}<span class="unit"> m</span></div>
        <div class="stat-sub">Houle ${Math.round(period)}s</div>
      </div>

      <div class="stat-divider"></div>

      <!-- Vent avec flèche directionnelle -->
      <div class="stat">
        <svg class="wind-arrow" style="transform: rotate(${arrowRot}deg)" viewBox="0 0 28 28" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <line x1="14" y1="24" x2="14" y2="4"/>
          <polyline points="8,10 14,4 20,10"/>
        </svg>
        <div class="stat-value">${Math.round(windSpd)}<span class="unit"> km/h</span></div>
        <div class="stat-sub">${windQuality(windDir)}</div>
      </div>

      <div class="stat-divider"></div>

      <!-- Météo -->
      <div class="stat">
        <svg class="stat-icon" viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round">
          <circle cx="16" cy="16" r="6"/>
          <line x1="16" y1="2" x2="16" y2="5"/>
          <line x1="16" y1="27" x2="16" y2="30"/>
          <line x1="2" y1="16" x2="5" y2="16"/>
          <line x1="27" y1="16" x2="30" y2="16"/>
          <line x1="6" y1="6" x2="8.1" y2="8.1"/>
          <line x1="23.9" y1="23.9" x2="26" y2="26"/>
          <line x1="26" y1="6" x2="23.9" y2="8.1"/>
          <line x1="8.1" y1="23.9" x2="6" y2="26"/>
        </svg>
        <div class="stat-value">${Math.round(temp)}<span class="unit">°C</span></div>
        <div class="stat-sub">${getWeatherLabel(wcode)}</div>
      </div>
    </div>

    ${tideHTML}

    <div class="hourly">
      ${hours.map((h, i) => `
        <div class="hour-pill ${i === 0 ? 'active' : ''}" onclick="selectHour(this, ${h.h})">
          <span class="hour-time">${h.h}h${h.isNextDay ? '<span style="font-size:9px;opacity:0.5;margin-left:1px">+1</span>' : ''}</span>
          <div class="hour-dot ${getDotClass(h.sc)}"></div>
          <span>${h.wh.toFixed(1)}m</span>
        </div>
      `).join('')}
    </div>

  </div>`;

  // Animate ring
  requestAnimationFrame(() => requestAnimationFrame(() => {
    const arc = document.getElementById('ringArc');
    if (arc) arc.style.strokeDashoffset = dash;
  }));
}

function selectHour(el, h) {
  document.querySelectorAll('.hour-pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  selectedHour = h;
  render();
}

async function init() {
  try {
    await fetchData();
    document.getElementById('loading').style.display = 'none';
    render();
  } catch(e) {
    document.getElementById('app').innerHTML = `
      <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:16px;padding:40px;text-align:center">
        <div style="font-size:36px">⚠️</div>
        <div style="color:#ef476f;font-size:13px;letter-spacing:1px">Erreur de connexion<br><span style="opacity:0.5;font-size:11px">${e.message}</span></div>
      </div>`;
  }
}

init();
</script>
</body>
</html>
