<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Podcast Tracker Pro</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#f2f2f7">
    <link rel="apple-touch-icon" href="icon-192.png?v=3">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
    /* ═══════════════════════════════════════════════
        VARIABLES & RESET (Ton design original)
    ═══════════════════════════════════════════════ */
    :root {
        --bg:        #f2f2f7;
        --card:      #ffffff;
        --text:      #000000;
        --text-sec:  #8e8e93;
        --green:      #34c759;
        --gray-dot:  #d1d1d6;
        --border:    #e5e5ea;
        --r-lg:      24px;
        --r-sm:      16px;
        --natif:     #82b1ff;
        --integrale: #ffcc80;
        --chronique: #a5d6a7;
        --topbar-h:  62px;
    }
    body.dark {
        --bg:       #000000;
        --card:     #1c1c1e;
        --text:     #ffffff;
        --text-sec: #8e8e98;
        --border:   #38383a;
        --gray-dot: #48484a;
    }
    *, *::before, *::after {
        box-sizing: border-box; margin: 0; padding: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        -webkit-tap-highlight-color: transparent;
    }
    body {
        background: var(--bg); color: var(--text);
        min-height: 100vh;
        transition: background .3s, color .3s;
        overscroll-behavior-y: none;
    }

    /* ═══════════════════════════════════════════════
       TOPBAR & LAYOUT (Repris de ton code initial)
    ═══════════════════════════════════════════════ */
    .topbar { display: none; }
    @media (min-width: 900px) {
        :root { --topbar-h: 72px; }
        .topbar {
            display: grid; grid-template-columns: 1fr auto 1fr; align-items: center;
            height: var(--topbar-h); padding: 0 28px; background: var(--card);
            border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 300;
        }
        .topbar-left, .topbar-right { display: flex; align-items: center; gap: 8px; }
        .topbar-nav-btn {
            padding: 8px 14px; border-radius: 12px; border: none; background: var(--bg);
            color: var(--text-sec); font-size: 13px; font-weight: 600; cursor: pointer;
        }
        .topbar-nav-btn.active { background: var(--text); color: var(--bg); }
        .topbar-logo { display: flex; align-items: center; gap: 9px; font-weight: 800; }
        .topbar-search { background: var(--bg); border-radius: 22px; padding: 8px 14px; width: 220px; display: flex; align-items: center; }
        .topbar-search input { border: none; background: transparent; outline: none; margin-left: 8px; width: 100%; }
    }

    .layout { width: 100%; max-width: 440px; margin: 0 auto; padding: 20px 20px 100px; display: flex; flex-direction: column; gap: 0; }
    @media (min-width: 900px) {
        .layout { max-width: 1280px; padding: 0; display: grid; grid-template-columns: 420px 1fr; }
        .col-left { position: sticky; top: var(--topbar-h); height: calc(100vh - var(--topbar-h)); overflow-y: auto; padding: 24px 24px 0 40px; border-right: 1px solid var(--border); display: flex; flex-direction: column; gap: 16px; }
        .col-right { height: calc(100vh - var(--topbar-h)); overflow-y: auto; padding: 28px 40px 40px 28px; display: flex; flex-direction: column; gap: 20px; }
    }

    /* ═══════════════════════════════════════════════
       GRAPHIQUE & CARDS (Ton CSS d'origine)
    ═══════════════════════════════════════════════ */
    .chart-card { background: var(--card); border-radius: var(--r-lg); padding: 20px 20px 36px; box-shadow: 0 2px 16px rgba(0,0,0,.06); position: relative; }
    .chart-total { font-size: 38px; font-weight: 800; letter-spacing: -2px; margin-bottom: 22px; }
    .chart-area { position: relative; height: 140px; display: flex; align-items: flex-end; padding-right: 30px; }
    .chart-bars { display: flex; justify-content: space-between; width: 100%; height: 100%; position: relative; z-index: 2; }
    .bar-col { display: flex; flex-direction: column; align-items: center; height: 100%; justify-content: flex-end; width: 30px; position: relative; cursor: pointer; }
    .bar { width: 18px; background: var(--text); border-radius: 4px 4px 0 0; transition: height .5s ease; }
    .grid-line { position: absolute; width: 100%; border-bottom: 1px solid var(--border); z-index: 1; }
    .grid-label { font-size: 11px; color: var(--text-sec); position: absolute; right: -25px; transform: translateY(50%); }

    /* Liste */
    .podcast-list { background: var(--card); border-radius: var(--r-lg); padding: 10px 20px; box-shadow: 0 4px 20px rgba(0,0,0,.04); }
    .podcast-item { display: flex; align-items: center; padding: 16px 12px; border-bottom: 1px solid var(--bg); cursor: pointer; transition: transform .2s; }
    .podcast-img { width: 48px; height: 48px; border-radius: 12px; object-fit: cover; margin-right: 16px; flex-shrink: 0; }
    .podcast-info { flex: 1; overflow: hidden; }
    .podcast-name { font-size: 16px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .podcast-count { font-size: 17px; font-weight: 600; margin-left: 10px; }

    /* Modals & Player */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 400; align-items: flex-end; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal-box { background: var(--bg); width: 100%; max-height: 88vh; border-radius: 20px 20px 0 0; display: flex; flex-direction: column; overflow: hidden; }
    @media (min-width: 900px) { .modal-box { width: 600px; border-radius: 20px; margin-bottom: 5vh; } }
    .modal-header { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .modal-body { padding: 24px; overflow-y: auto; flex: 1; }

    .player-modal { display: none; position: fixed; inset: 0; background: rgba(20,20,20,.88); backdrop-filter: blur(28px); z-index: 1000; flex-direction: column; align-items: center; color: #fff; overflow-y: auto; }
    .player-modal.open { display: flex; }
    .player-inner { width: 100%; max-width: 440px; padding: 40px 20px; display: flex; flex-direction: column; align-items: center; }
    .player-cover { width: 260px; height: 260px; border-radius: 22px; box-shadow: 0 20px 60px rgba(0,0,0,.6); margin-bottom: 30px; object-fit: cover; }
    .btn-playpause { width: 70px; height: 70px; border-radius: 50%; background: #fff; color: #000; border: none; font-size: 30px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .progress-slider { width: 100%; -webkit-appearance: none; height: 5px; background: rgba(255,255,255,.2); border-radius: 5px; margin: 20px 0; }
    .progress-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 15px; height: 15px; background: #fff; border-radius: 50%; cursor: pointer; }

    /* ⚡ AJOUTS DES NOUVELLES FONCTIONS (Styles) ⚡ */
    .speed-btn { padding: 6px 12px; border-radius: 20px; border: none; background: rgba(255,255,255,0.1); color: #fff; font-size: 12px; cursor: pointer; font-weight: 600; }
    .speed-btn.active { background: #fff; color: #000; }
    .resume-badge { display: none; align-items: center; gap: 8px; padding: 10px; background: rgba(52,199,89,.2); color: #34c759; border-radius: 12px; margin-bottom: 15px; cursor: pointer; font-weight: 600; font-size: 13px; }
    .resume-badge.show { display: flex; }

    /* Mini player & Player Card */
    .mini-player { display: none; position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: calc(100% - 32px); max-width: 420px; background: var(--card); border-radius: 20px; padding: 10px; box-shadow: 0 8px 32px rgba(0,0,0,0.15); z-index: 350; align-items: center; gap: 10px; border: 1px solid var(--border); }
    .mini-player.visible { display: flex; }
    .mini-cover { width: 44px; height: 44px; border-radius: 10px; object-fit: cover; }

    .player-card { display: none; background: #1e1e22; border-radius: 22px 22px 0 0; padding: 16px; margin-top: auto; color: white; }
    @media (min-width: 900px) { .player-card { display: flex; flex-direction: column; gap: 10px; } }
    </style>
</head>
<body>

<div class="topbar">
    <div class="topbar-left">
        <button class="topbar-nav-btn" onclick="openPlayer()">Lecteur</button>
        <button class="topbar-nav-btn" onclick="openHistory()">Calendrier</button>
        <button class="topbar-nav-btn" onclick="openSettings()">Paramètres</button>
    </div>
    <div class="topbar-center">
        <div class="topbar-logo">🎙️ PodcastTracker</div>
    </div>
    <div class="topbar-right">
        <div class="topbar-search">
            <input id="search-desktop" type="text" placeholder="Rechercher..." oninput="updateView()">
        </div>
    </div>
</div>

<div class="layout">
    <div class="col-left">
        <div id="stats-zone"></div>
        
        <div class="player-card" id="player-card">
            <div style="display:flex; gap:12px; align-items:center;">
                <img id="pc-cover" src="" style="width:46px; height:46px; border-radius:8px; object-fit:cover;">
                <div style="overflow:hidden;">
                    <div id="pc-title" style="font-size:13px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">–</div>
                    <div id="pc-podcast" style="font-size:11px; opacity:0.6;">–</div>
                </div>
            </div>
            <input id="pc-progress" type="range" class="progress-slider" style="margin:8px 0; height:3px;">
            <div style="display:flex; justify-content:space-between; font-size:10px; opacity:0.5;">
                <span id="pc-time-cur">0:00</span>
                <button onclick="togglePlay()" style="background:none; border:none; color:white; font-size:18px; cursor:pointer;">⏯️</button>
                <span id="pc-time-tot">0:00</span>
            </div>
        </div>
    </div>

    <div class="col-right">
        <div id="list-zone">
            <div style="padding:50px; text-align:center;">Chargement des flux...</div>
        </div>
    </div>
</div>

<div class="mini-player" id="mini-player" onclick="openPlayer()">
    <img id="mini-cover" class="mini-cover" src="">
    <div style="flex:1; overflow:hidden;">
        <div id="mini-title" style="font-size:13px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">–</div>
        <div id="mini-podcast" style="font-size:11px; opacity:0.6;">–</div>
    </div>
    <button onclick="event.stopPropagation(); togglePlay();" style="background:none; border:none; font-size:20px;">⏯️</button>
</div>

<div class="player-modal" id="player-modal">
    <div class="player-inner">
        <button onclick="closePlayer()" style="align-self:flex-end; background:none; border:none; color:white; font-size:24px; cursor:pointer;">✕</button>
        <img id="player-cover" class="player-cover" src="">
        <h2 id="player-title" style="text-align:center; margin-bottom:8px;">–</h2>
        <p id="player-podcast-name" style="opacity:0.5; margin-bottom:20px;">–</p>

        <div class="player-controls">
            <div id="resume-badge" class="resume-badge" onclick="resumePosition()">
                ↩️ Reprendre à <span id="resume-time">0:00</span>
            </div>

            <input id="player-progress" type="range" class="progress-slider" value="0">
            <div style="display:flex; justify-content:space-between; font-size:12px; margin-top:-10px; opacity:0.7;">
                <span id="time-current">0:00</span>
                <span id="time-total">0:00</span>
            </div>

            <div style="display:flex; justify-content:center; align-items:center; gap:30px; margin:20px 0;">
                <button onclick="seekAudio(-15)" style="background:none; border:none; color:white; font-size:25px;">⏪</button>
                <button class="btn-playpause" onclick="togglePlay()" id="main-play-btn">▶️</button>
                <button onclick="seekAudio(15)" style="background:none; border:none; color:white; font-size:25px;">⏩</button>
            </div>

            <div style="display:flex; justify-content:center; gap:8px; flex-wrap:wrap;">
                <button class="speed-btn" onclick="setSpeed(1)">1x</button>
                <button class="speed-btn" onclick="setSpeed(1.5)">1.5x</button>
                <button class="speed-btn" onclick="setSpeed(2)">2x</button>
                <button id="sleep-btn" class="speed-btn" onclick="toggleSleepTimer()">🌙 Sommeil</button>
            </div>
        </div>
    </div>
</div>

<div class="modal-overlay" id="settings-modal">
    <div class="modal-box">
        <div class="modal-header">
            <h3>Paramètres</h3>
            <button onclick="closeModal('settings-modal')" style="border:none; background:none; font-size:20px;">✕</button>
        </div>
        <div class="modal-body">
            <div style="display:flex; justify-content:space-between; align-items:center; background:var(--card); padding:15px; border-radius:12px;">
                <span>Mode Sombre</span>
                <input type="checkbox" id="dark-toggle" onchange="toggleDarkMode()">
            </div>
            <p style="margin-top:20px; font-size:12px; color:var(--text-sec);">Version 2.0 - Optimisée</p>
        </div>
    </div>
</div>

<div class="modal-overlay" id="history-modal">
    <div class="modal-box">
        <div class="modal-header">
            <h3>Historique / Calendrier</h3>
            <button onclick="closeModal('history-modal')" style="border:none; background:none; font-size:20px;">✕</button>
        </div>
        <div class="modal-body" id="history-body"></div>
    </div>
</div>

<audio id="audio"></audio>

<script>
/* ═══════════════════════════════════════════════
   LOGIQUE JAVASCRIPT (REPARÉE ET COMPLÈTE)
═══════════════════════════════════════════════ */

// Ta config originale
const DEFAULT_CONFIG = [
    { url:"https://feeds.audiomeans.fr/feed/17652c76-f6e2-47da-b4de-ab791a8de6f9.xml", comptabilise:true, natif:false },
    { url:"https://feeds.audiomeans.fr/feed/b38cbcd5-a1b8-4f4c-997a-d40c2c04f9e8.xml", comptabilise:true, natif:false },
    { url:"https://feeds.audiomeans.fr/feed/1c147c6c-b4f0-46ae-a101-d0436ffa3d0e.xml", comptabilise:true, natif:true },
    { url:"https://feeds.audiomeans.fr/feed/80a39a48-f044-436e-ad5b-63d3154efa91.xml", comptabilise:true, natif:true }
];

let podcastConfig = JSON.parse(localStorage.getItem('podcastConfig')) || DEFAULT_CONFIG;
let allData = [], historyData = [];
let trackIdx = -1, queue = [];
let favorites = JSON.parse(localStorage.getItem('favorites') || '[]');
let currentSpeed = parseFloat(localStorage.getItem('playbackSpeed') || '1');
let savedPositions = JSON.parse(localStorage.getItem('savedPositions') || '{}');
let sleepTimeout = null;

const audio = document.getElementById('audio');
const BLANK = "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiPjxyZWN0IHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiIGZpbGw9IiMzMzMiLz48L3N2Zz4=";

const today = new Date(); today.setHours(0,0,0,0);
const DAYS = Array.from({length:9},(_,i)=>{ const d=new Date(today); d.setDate(d.getDate()-(8-i)); return d.getTime(); });

function initApp() {
    if(localStorage.getItem('darkMode') === 'true') { document.body.classList.add('dark'); document.getElementById('dark-toggle').checked = true; }
    loadCache();
    fetchFeeds();
    
    audio.addEventListener('timeupdate', onTimeUpdate);
    audio.addEventListener('ended', () => { playNext(); });
    audio.addEventListener('play', () => { updateMediaSession(); syncIcons(); });
    audio.addEventListener('pause', () => { syncIcons(); });

    // Amélioration 4 : Sauvegarde avant fermeture
    window.addEventListener('beforeunload', saveCurrentPosition);
}

// 🌐 FETCH RSS & CACHE
async function fetchFeeds() {
    const tPods = [], tHist = [];
    for(const cfg of podcastConfig) {
        try {
            const res = await fetch(`https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(cfg.url)}`);
            const xml = new DOMParser().parseFromString(await res.text(), 'text/xml');
            const title = xml.querySelector('channel > title')?.textContent || 'Inconnu';
            const img = xml.querySelector('channel > image > url')?.textContent || xml.querySelector('image')?.getAttribute('href') || BLANK;
            const items = [...xml.querySelectorAll('item')];

            const counts = {}; DAYS.forEach(d => counts[d] = 0);
            items.forEach(item => {
                const d = new Date(item.querySelector('pubDate').textContent);
                d.setHours(0,0,0,0);
                if(counts[d.getTime()] !== undefined) {
                    counts[d.getTime()]++;
                    tHist.push({ podcast: title, title: item.querySelector('title').textContent, url: item.querySelector('enclosure').getAttribute('url'), image: img, date: new Date(item.querySelector('pubDate').textContent) });
                }
            });

            tPods.push({ name: title, url: cfg.url, image: img, comptabilise: cfg.comptabilise, natif: cfg.natif, dailyCounts: counts, latestTitle: items[0]?.querySelector('title').textContent });
        } catch(e) { console.error("Erreur flux:", e); }
    }
    allData = tPods;
    historyData = tHist.sort((a,b) => b.date - a.date);
    saveCache(allData, historyData);
    updateView();
}

// 📊 RENDU INTERFACE
function updateView() {
    const listZone = document.getElementById('list-zone');
    let html = '<div class="podcast-list">';
    const srch = document.getElementById('search-desktop').value.toLowerCase();

    allData.filter(p => p.name.toLowerCase().includes(srch)).forEach(p => {
        html += `
            <div class="podcast-item" onclick="setupPlayer('${p.url}')">
                <img src="${p.image}" class="podcast-img">
                <div class="podcast-info">
                    <div class="podcast-name">${p.name}</div>
                    <div style="font-size:12px; color:var(--text-sec);">${p.latestTitle}</div>
                </div>
                <div class="podcast-count">${p.dailyCounts[DAYS[8]] || 0}</div>
            </div>`;
    });
    listZone.innerHTML = html + '</div>';
    renderStats();
}

function renderStats() {
    const graph = DAYS.map(t => ({ label: new Date(t).toLocaleDateString('fr-FR', {weekday:'short'}), count: 0 }));
    let grandTotal = 0;
    allData.forEach(p => { 
        if(p.comptabilise) {
            DAYS.forEach((t, i) => { graph[i].count += (p.dailyCounts[t] || 0); });
            grandTotal += (p.dailyCounts[DAYS[8]] || 0);
        }
    });

    const max = Math.max(...graph.map(g => g.count), 1);
    
    document.getElementById('stats-zone').innerHTML = `
        <div class="chart-card">
            <div style="font-size:13px; color:var(--text-sec);">Aujourd'hui (Comptabilisés)</div>
            <div class="chart-total">${grandTotal}</div>
            <div class="chart-area">
                <div class="grid-line" style="bottom:100%"><span class="grid-label">${max}</span></div>
                <div class="grid-line" style="bottom:50%"><span class="grid-label">${Math.round(max/2)}</span></div>
                <div class="chart-bars">
                    ${graph.map(g => `<div class="bar-col"><div class="bar" style="height:${(g.count/max)*100}%"></div><div style="font-size:10px; margin-top:5px; opacity:0.5;">${g.label}</div></div>`).join('')}
                </div>
            </div>
        </div>
    `;
}

// 🎧 LECTEUR & AMELIORATIONS
function setupPlayer(feedUrl) {
    const p = allData.find(d => d.url === feedUrl);
    const eps = historyData.filter(h => h.podcast === p.name);
    if(!eps.length) return;
    queue = historyData.slice(0, 50);
    trackIdx = queue.findIndex(q => q.url === eps[0].url);
    loadTrack(trackIdx);
    openPlayer();
    audio.play();
}

function loadTrack(idx) {
    if(idx < 0 || idx >= queue.length) return;
    const t = queue[idx];
    trackIdx = idx;
    audio.src = t.url;
    audio.playbackRate = currentSpeed;

    // Update UI partout
    const covers = [document.getElementById('player-cover'), document.getElementById('mini-cover'), document.getElementById('pc-cover')];
    const titles = [document.getElementById('player-title'), document.getElementById('mini-title'), document.getElementById('pc-title')];
    const pods = [document.getElementById('player-podcast-name'), document.getElementById('mini-podcast'), document.getElementById('pc-podcast')];
    
    covers.forEach(c => c.src = t.image);
    titles.forEach(ti => ti.textContent = t.title);
    pods.forEach(p => p.textContent = t.podcast);

    document.getElementById('mini-player').classList.add('visible');

    // Reprise (Amélioration 4)
    const saved = savedPositions[t.url];
    if(saved > 5) {
        document.getElementById('resume-time').textContent = fmt(saved);
        document.getElementById('resume-badge').classList.add('show');
    } else {
        document.getElementById('resume-badge').classList.remove('show');
    }
    updateMediaSession();
}

// Amélioration 1 : Media Session (Lockscreen)
function updateMediaSession() {
    if ('mediaSession' in navigator && trackIdx >= 0) {
        const t = queue[trackIdx];
        navigator.mediaSession.metadata = new MediaMetadata({
            title: t.title,
            artist: t.podcast,
            artwork: [{ src: t.image, sizes: '512x512', type: 'image/png' }]
        });
        navigator.mediaSession.setActionHandler('play', () => audio.play());
        navigator.mediaSession.setActionHandler('pause', () => audio.pause());
        navigator.mediaSession.setActionHandler('seekbackward', () => seekAudio(-15));
        navigator.mediaSession.setActionHandler('seekforward', () => seekAudio(15));
    }
}

// Amélioration 2 : Sleep Timer
function toggleSleepTimer() {
    if (sleepTimeout) {
        clearTimeout(sleepTimeout); sleepTimeout = null;
        document.getElementById('sleep-btn').classList.remove('active');
        document.getElementById('sleep-btn').textContent = "🌙 Sommeil";
    } else {
        const mins = prompt("Couper le son dans combien de minutes ?", "30");
        if (mins) {
            document.getElementById('sleep-btn').classList.add('active');
            document.getElementById('sleep-btn').textContent = mins + "m";
            sleepTimeout = setTimeout(() => { audio.pause(); toggleSleepTimer(); }, mins * 60000);
        }
    }
}

function togglePlay() { audio.paused ? audio.play() : audio.pause(); }
function syncIcons() {
    const btn = document.getElementById('main-play-btn');
    btn.textContent = audio.paused ? "▶️" : "⏸️";
}
function seekAudio(s) { audio.currentTime += s; }
function setSpeed(s) { currentSpeed = s; audio.playbackRate = s; localStorage.setItem('playbackSpeed', s); updateSpeedUI(); }
function updateSpeedUI() {
    document.querySelectorAll('.speed-btn').forEach(b => {
        b.classList.toggle('active', parseFloat(b.getAttribute('onclick').match(/[\d.]+/)) === currentSpeed);
    });
}

function onTimeUpdate() {
    const pct = (audio.currentTime / audio.duration) * 100 || 0;
    document.getElementById('player-progress').value = pct;
    document.getElementById('pc-progress').value = pct;
    document.getElementById('time-current').textContent = fmt(audio.currentTime);
    document.getElementById('pc-time-cur').textContent = fmt(audio.currentTime);
    document.getElementById('time-total').textContent = fmt(audio.duration);
    document.getElementById('pc-time-tot').textContent = fmt(audio.duration);
}

function fmt(s) { if(isNaN(s)) return '0:00'; return Math.floor(s/60) + ':' + String(Math.floor(s%60)).padStart(2,'0'); }

// Amélioration 3 & 4 : Cache et Sauvegarde
function saveCache(p, h) { localStorage.setItem('podcastsDataCache', JSON.stringify({ podcasts: p, history: h.slice(0, 150) })); }
function loadCache() {
    const d = JSON.parse(localStorage.getItem('podcastsDataCache'));
    if(d) { allData = d.podcasts; historyData = d.history; updateView(); }
}
function saveCurrentPosition() {
    if(trackIdx >= 0 && audio.currentTime > 5) {
        savedPositions[queue[trackIdx].url] = audio.currentTime;
        localStorage.setItem('savedPositions', JSON.stringify(savedPositions));
    }
}
function resumePosition() {
    audio.currentTime = savedPositions[queue[trackIdx].url] || 0;
    audio.play();
    document.getElementById('resume-badge').classList.remove('show');
}

// NAVIGATION / MODALS
function openPlayer() { document.getElementById('player-modal').classList.add('open'); }
function closePlayer() { document.getElementById('player-modal').classList.remove('open'); }
function openSettings() { document.getElementById('settings-modal').classList.add('open'); }
function openHistory() {
    const body = document.getElementById('history-body');
    body.innerHTML = historyData.slice(0, 30).map(h => `
        <div style="padding:10px; border-bottom:1px solid var(--border); font-size:13px;">
            <div style="font-weight:700;">${h.podcast}</div>
            <div style="opacity:0.7;">${h.title}</div>
            <div style="font-size:10px; opacity:0.5;">${new Date(h.date).toLocaleDateString()}</div>
        </div>
    `).join('');
    document.getElementById('history-modal').classList.add('open');
}
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function toggleDarkMode() { document.body.classList.toggle('dark'); localStorage.setItem('darkMode', document.body.classList.contains('dark')); }

initApp();
</script>
