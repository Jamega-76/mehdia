<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mehdia Surf</title>
<link rel="icon" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mehdia Surf">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#000;--muted:rgba(255,255,255,0.4);--card:rgba(255,255,255,0.05);--border:rgba(255,255,255,0.09)}
html,body{height:100%;background:#000;color:#fff;font-family:'Inter',-apple-system,sans-serif;overflow-x:hidden}

/* LOADING */
#loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:18px}
.loader{width:44px;height:44px;border:2px solid rgba(0,255,136,0.15);border-top-color:#00ff88;border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:11px;color:var(--muted);letter-spacing:3px;text-transform:uppercase;animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}

/* LAYOUT */
.screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:52px 20px 40px;max-width:420px;margin:0 auto;gap:18px}

/* SHARE */
.share-btn{position:fixed;top:14px;right:14px;z-index:100;width:36px;height:36px;background:var(--card);border:1px solid var(--border);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);transition:.2s}
.share-btn:hover{color:#fff}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(70px);background:rgba(30,30,30,0.95);border:1px solid var(--border);border-radius:100px;padding:10px 20px;font-size:13px;color:#fff;white-space:nowrap;transition:transform .35s cubic-bezier(.34,1.56,.64,1);z-index:200}
.toast.show{transform:translateX(-50%) translateY(0)}

/* HEADER */
.header{text-align:center;animation:fadeUp .5s ease forwards;opacity:0;width:100%}
.header h1{font-size:22px;font-weight:700;margin-bottom:4px}
.dt{font-size:13px;color:var(--muted)}
.sun-row{display:flex;align-items:center;justify-content:center;gap:14px;margin-top:7px}
.sun-item{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--muted)}

/* DAYS */
.days{display:flex;gap:5px;width:100%;animation:fadeUp .5s .05s ease forwards;opacity:0}
.day-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;padding:9px 4px 7px;border:1px solid var(--border);border-radius:12px;background:var(--card);cursor:pointer;transition:.2s}
.day-btn.active{border-color:rgba(0,255,136,.4);background:rgba(0,255,136,.06)}
.day-name{font-size:9px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted)}
.day-btn.active .day-name{color:#00ff88}
.day-num{font-size:15px;font-weight:700}
.day-dot{width:6px;height:6px;border-radius:50%}

/* RING */
.ring-section{animation:fadeUp .5s .1s ease forwards;opacity:0}
.ring-wrapper{position:relative;width:220px;height:220px}
.ring-svg{width:220px;height:220px;transform:rotate(-90deg)}
.ring-track{fill:none;stroke:rgba(255,255,255,.07);stroke-width:5}
.ring-arc{fill:none;stroke-width:5;stroke-linecap:round;stroke-dasharray:597;stroke-dashoffset:597;transition:stroke-dashoffset 1.8s cubic-bezier(.34,1.1,.64,1)}
.ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px}
.ring-label{font-size:22px;font-weight:900;letter-spacing:3px;text-transform:uppercase;line-height:1;margin-bottom:8px}
.ring-sub{font-size:12px;color:rgba(255,255,255,.6);line-height:1.5}

/* STATS */
.stats{display:flex;align-items:stretch;width:100%;animation:fadeUp .5s .2s ease forwards;opacity:0}
.stat{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;padding:4px 0}
.sdiv{width:1px;background:var(--border);margin:6px 0}
.stat-icon{width:26px;height:26px;color:rgba(255,255,255,.5)}
.stat-val{font-size:21px;font-weight:800;line-height:1;letter-spacing:-1px}
.unit{font-size:11px;font-weight:500;color:rgba(255,255,255,.5);letter-spacing:0}
.stat-sub{font-size:10px;font-weight:600;color:var(--muted);letter-spacing:.8px;text-transform:uppercase;text-align:center}
.wind-arrow{width:24px;height:24px;color:rgba(255,255,255,.5)}

/* EXTRA */
.extra{display:flex;gap:8px;width:100%;animation:fadeUp .5s .25s ease forwards;opacity:0}
.extra-card{flex:1;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:11px 13px;display:flex;align-items:center;gap:9px}
.extra-card svg{width:20px;height:20px;color:rgba(255,255,255,.45);flex-shrink:0}
.extra-label{font-size:9px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:2px}
.extra-val{font-size:17px;font-weight:800}

/* TIDE */
.tide{width:100%;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:13px 16px;display:flex;align-items:center;justify-content:space-between;animation:fadeUp .5s .3s ease forwards;opacity:0}
.tide-left{display:flex;align-items:center;gap:11px}
.tide-emoji{font-size:20px}
.tide-label{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:3px}
.tide-status{font-size:16px;font-weight:800}
.tide-right{text-align:right}
.tide-next-label{font-size:9px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:3px}
.tide-next-time{font-size:18px;font-weight:800}
.tide-next-sub{font-size:11px;color:var(--muted);margin-top:2px}

/* HOURLY */
.hourly-wrap{width:100%;animation:fadeUp .5s .35s ease forwards;opacity:0}
.hourly-title{font-size:9px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:9px;text-align:center}
.hourly{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;width:100%}
.hourly::-webkit-scrollbar{display:none}
.hour-pill{display:flex;flex-direction:column;align-items:center;gap:6px;padding:12px 14px;border:1px solid var(--border);border-radius:14px;cursor:pointer;transition:.2s;flex-shrink:0;background:var(--card);min-width:64px}
.hour-pill:hover{border-color:rgba(255,255,255,.2)}
.hour-pill.active{border-color:rgba(0,255,136,.35);background:rgba(0,255,136,.05)}
.hour-time{font-size:11px;color:var(--muted);font-weight:600}
.hour-dot{width:7px;height:7px;border-radius:50%}
.hour-size{font-size:15px;font-weight:800}
.hour-status{font-size:9px;font-weight:600;letter-spacing:.5px;text-transform:uppercase}

@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<button class="share-btn" onclick="shareApp()" title="Partager">
  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
    <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
    <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
  </svg>
</button>
<div class="toast" id="toast">🔗 Lien copié !</div>

<div id="app">
  <div id="loading">
    <div class="loader"></div>
    <div class="loading-text">Chargement des vagues…</div>
  </div>
</div>

<script>
const LAT=34.263, LON=-6.653;
const SGKEY='ba979f76-1107-11f1-b7ff-0242ac120004-ba979fd0-1107-11f1-b7ff-0242ac120004';
const DAYS=['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
const FDAYS=['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
const MONTHS=['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'];
let M=null, W=null, T=null, selDay=0;

function getMehdiaHour(){
  const h=new Intl.DateTimeFormat('fr-FR',{timeZone:'Africa/Casablanca',hour:'numeric',hour12:false}).format(new Date());
  const n=parseInt(h);
  return isNaN(n)?new Date().getHours():n%24;
}
let selHour=getMehdiaHour();

// Taille face de vague surfable ≈ 65% de la houle
function faceH(houle){ return +(houle*0.65).toFixed(1); }

// Score 0-100 — critères stricts
function calcScore(wh, period, wind, windDeg){
  const h=faceH(wh);

  // Zone idéale : 0.8m–1.8m face. En dessous trop petit, au dessus trop gros.
  let s=0;
  if(h<0.3)       s=0;
  else if(h<0.5)  s=15;
  else if(h<0.8)  s=30+((h-0.5)/0.3)*15;   // 30→45
  else if(h<=1.2) s=55+((h-0.8)/0.4)*25;   // 55→80
  else if(h<=1.8) s=80+((h-1.2)/0.6)*15;   // 80→95
  else if(h<=2.5) s=95-((h-1.8)/0.7)*30;   // 95→65
  else if(h<=3.5) s=65-((h-2.5)/1.0)*40;   // 65→25
  else            s=Math.max(5, 25-(h-3.5)*10);

  // Période — très importante, pénalités sévères
  if(period>=14)      s=Math.min(100,s+12);
  else if(period>=11) s=Math.min(100,s+6);
  else if(period>=8)  s=s;                  // neutre
  else if(period>=6)  s-=10;
  else                s-=22;               // houle courte, mauvaise qualité

  // Vent — pénalités sévères, bonus faible
  const isOffshore = windDeg!==undefined && (()=>{const d=((windDeg-315+540)%360)-180;return Math.abs(d)>135;})();
  if(wind>35)       s-=40;
  else if(wind>25)  s-=28;
  else if(wind>18)  s-=18;
  else if(wind>12)  s-=8;
  else if(wind<=8 && isOffshore) s=Math.min(100,s+8);  // offshore léger = bonus
  else if(wind<=8)  s=Math.min(100,s+3);

  return Math.max(0,Math.min(100,Math.round(s)));
}

// Tranche horaire
function timeSlot(hour){
  if(hour>=5  && hour<12) return 'Matin';
  if(hour>=12 && hour<15) return 'Midi';
  if(hour>=15 && hour<20) return 'Après-midi';
  if(hour>=20 && hour<23) return 'Soirée';
  return null;
}

// Statuts du meilleur au pire — seuils stricts
function getStatus(s, hour){
  if(hour!==undefined){
    if(hour>=23 || hour<5) return {label:'DODO TIME',  color:'#9b8eff', night:true};
    if(hour>=20 || hour<7) return {label:'GO NETFLIX', color:'#b388ff', night:true};
  }
  // EXCELLENT : score ≥92 (conditions vraiment parfaites)
  if(s>=92) return {label:'EXCELLENT', color:'#00ff88'};
  if(s>=75) return {label:'TOP',       color:'#00e5ff'};
  if(s>=55) return {label:'SYMPA',     color:'#7bed9f'};
  if(s>=35) return {label:'SURFABLE',  color:'#ffd166'};
  if(s>=15) return {label:'DUR',       color:'#ff8c42'};
  return           {label:'PS5 DAY',   color:'#ef476f'};
}

function windLabel(deg){
  const d=((deg-315+540)%360)-180;
  if(Math.abs(d)<45) return 'ONSHORE';
  if(Math.abs(d)>135) return 'OFFSHORE';
  const dirs=['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSO','SO','OSO','O','ONO','NO','NNO'];
  return dirs[Math.round(deg/22.5)%16];
}

function wxLabel(c){
  if(c===0) return 'Ensoleillé';
  if(c<=2)  return 'Peu nuageux';
  if(c<=3)  return 'Couvert';
  if(c<=48) return 'Brouillard';
  if(c<=67) return 'Pluie';
  return 'Orageux';
}

function hi(day,h){ return day*24+h; }

function dayBestScore(d){
  let best=0;
  for(let h=6;h<=20;h++){
    const i=hi(d,h);
    const s=calcScore(M.hourly.wave_height[i]??0, M.hourly.wave_period[i]??8, W.hourly.wind_speed_10m[i]??0, W.hourly.wind_direction_10m?.[i]);
    if(s>best) best=s;
  }
  return best;
}

function sunTimes(d){
  try{
    const r=W.daily?.sunrise?.[d], s=W.daily?.sunset?.[d];
    if(!r||!s) return null;
    const f=t=>{const x=new Date(t);return`${String(x.getHours()).padStart(2,'0')}:${String(x.getMinutes()).padStart(2,'0')}`};
    return {rise:f(r), set:f(s)};
  }catch{ return null; }
}

function tideInfo(dayIdx, hour){
  if(!T?.data?.length) return null;
  const now=new Date(), ref=new Date(now);
  ref.setDate(now.getDate()+dayIdx); ref.setHours(hour,0,0,0);
  const ex=T.data.map(e=>({time:new Date(e.time),type:e.type,height:e.height})).sort((a,b)=>a.time-b.time);
  const next=ex.find(e=>e.time>ref);
  if(!next) return null;
  const dms=next.time-ref, dh=Math.floor(dms/3600000), dm=Math.floor((dms%3600000)/60000);
  const ts=`${String(next.time.getHours()).padStart(2,'0')}:${String(next.time.getMinutes()).padStart(2,'0')}`;
  return {
    montante: next.type==='high',
    nextType: next.type,
    nextTime: ts,
    nextIn: dh>0 ? `dans ${dh}h${dm||''}` : `dans ${dm}min`,
    nextH: next.height ? next.height.toFixed(1) : null
  };
}

async function fetchData(){
  const today=new Date(), end=new Date(today);
  end.setDate(today.getDate()+4);
  const fmt=d=>d.toISOString().split('T')[0];
  const [mr,wr]=await Promise.all([
    fetch(`https://marine-api.open-meteo.com/v1/marine?latitude=${LAT}&longitude=${LON}&hourly=wave_height,wave_period,sea_surface_temperature&start_date=${fmt(today)}&end_date=${fmt(end)}&timezone=Africa/Casablanca`),
    fetch(`https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&current=temperature_2m,wind_speed_10m,wind_direction_10m,weather_code&hourly=temperature_2m,wind_speed_10m,wind_direction_10m,weather_code&daily=sunrise,sunset&start_date=${fmt(today)}&end_date=${fmt(end)}&wind_speed_unit=kmh&timezone=Africa/Casablanca`)
  ]);
  M=await mr.json(); W=await wr.json();
  try{
    const tr=await fetch(`https://api.stormglass.io/v2/tide/extremes/point?lat=${LAT}&lng=${LON}&start=${Math.floor(today/1000)}&end=${Math.floor(end/1000)}`,{headers:{'Authorization':SGKEY}});
    const tj=await tr.json(); T=tj.data?tj:null;
  }catch{ T=null; }
}

function render(){
  const now=new Date();
  const idx=hi(selDay,selHour);
  const waveH=M.hourly.wave_height[idx]??0;
  const period=M.hourly.wave_period[idx]??8;
  const windSpd=W.hourly.wind_speed_10m[idx]??0;
  const windDeg=W.hourly.wind_direction_10m?.[idx]??W.current.wind_direction_10m??0;
  const temp=W.hourly.temperature_2m[idx]??W.current.temperature_2m??0;
  const wcode=W.hourly.weather_code[idx]??W.current.weather_code??0;
  const seaT=M.hourly.sea_surface_temperature?.[idx]??null;
  const fh=faceH(waveH);

  const sc=calcScore(waveH,period,windSpd,windDeg);
  const {label,color,night}=getStatus(sc,selHour);

  const d=new Date(now); d.setDate(d.getDate()+selDay);
  const dt=`${FDAYS[d.getDay()]} ${d.getDate()} ${MONTHS[d.getMonth()]}, ${String(selHour).padStart(2,'0')}h`;
  const sun=sunTimes(selDay);
  const tide=tideInfo(selDay,selHour);

  // 5 jours
  const days=Array.from({length:5},(_,i)=>{
    const x=new Date(now); x.setDate(x.getDate()+i);
    return {name:DAYS[x.getDay()], num:x.getDate(), sc:dayBestScore(i), color:getStatus(dayBestScore(i),12).color};
  });

  // Pills horaires : 5 heures consécutives — commence à l'heure EN COURS
  const curH=getMehdiaHour();
  const startH=selDay===0 ? curH : 8;
  const pills=Array.from({length:5},(_,i)=>{
    const absH=startH+i;
    const dOff=Math.floor(absH/24);
    const h=absH%24;
    const ix=hi(selDay+dOff,h);
    const wh=M.hourly.wave_height[ix]??0;
    const ws=W.hourly.wind_speed_10m[ix]??0;
    const wp=M.hourly.wave_period[ix]??8;
    const wd=W.hourly.wind_direction_10m?.[ix];
    const ps=calcScore(wh,wp,ws,wd);
    return {h, fh:faceH(wh), sc:ps, st:getStatus(ps,h), nextDay:dOff>0};
  });

  const C=2*Math.PI*95;
  const dash=C-(sc/100)*C;

  const slot=timeSlot(selHour);
  const subText=night
    ? (label==='DODO TIME' ? '😴 Il est tard, bonne nuit !' : '🎬 Pas de session ce soir…')
    : (slot ? `${slot} · ` : '') + (fh<0.3 ? 'Mer plate…' : fh<0.5 ? 'Petites vaguelettes' : `Vagues ~${fh}m face`);

  let tideHTML='';
  if(tide){
    tideHTML=`<div class="tide">
      <div class="tide-left">
        <div class="tide-emoji">${tide.montante?'🌊':'🏖️'}</div>
        <div><div class="tide-label">Marée</div><div class="tide-status">${tide.montante?'Montante':'Descendante'}</div></div>
      </div>
      <div class="tide-right">
        <div class="tide-next-label">${tide.nextType==='high'?'Pleine mer':'Basse mer'} à</div>
        <div class="tide-next-time">${tide.nextTime}</div>
        <div class="tide-next-sub">${tide.nextIn}${tide.nextH?' · '+tide.nextH+'m':''}</div>
      </div>
    </div>`;
  }

  document.getElementById('app').innerHTML=`<div class="screen">

  <div class="header">
    <h1>Mehdia Plage</h1>
    <div class="dt">${dt}</div>
    ${sun?`<div class="sun-row">
      <div class="sun-item"><svg width="11" height="11" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M7 2v1M7 11v1M2 7H1M13 7h-1M3.5 3.5l-.7-.7M11.2 11.2l-.7-.7M3.5 10.5l-.7.7M11.2 2.8l-.7.7"/><circle cx="7" cy="7" r="2.5"/></svg>${sun.rise}</div>
      <div style="width:1px;height:8px;background:rgba(255,255,255,.1)"></div>
      <div class="sun-item"><svg width="11" height="11" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M7 2v1M7 11v1M2 7H1M13 7h-1M3.5 3.5l-.7-.7M11.2 11.2l-.7-.7M3.5 10.5l-.7.7M11.2 2.8l-.7.7"/><circle cx="7" cy="7" r="2.5"/></svg>${sun.set}</div>
    </div>`:''}
  </div>

  <div class="days">${days.map((d,i)=>`<div class="day-btn${i===selDay?' active':''}" onclick="selDay=${i};selHour=${i===0?'getMehdiaHour()':'10'};render()" style="border-color:${i===selDay?d.color+'66':''}">
    <div class="day-name" style="color:${d.color}">${d.name}</div>
    <div class="day-num" style="color:${d.color};text-shadow:0 0 12px ${d.color}66">${d.num}</div>
    <svg width="18" height="10" viewBox="0 0 22 10" fill="none" stroke="${d.color}" stroke-width="2" stroke-linecap="round" style="filter:drop-shadow(0 0 4px ${d.color}88)">
      <path d="M1 6c1.5-2 3-3.5 5-3.5s3.5 3 6 3 3.5-3 8-3"/>
    </svg>
  </div>`).join('')}</div>

  <div class="ring-section"><div class="ring-wrapper">
    <svg class="ring-svg" viewBox="0 0 220 220">
      <circle class="ring-track" cx="110" cy="110" r="95"/>
      <circle class="ring-arc" id="arc" cx="110" cy="110" r="95" stroke="${color}"
        style="stroke-dashoffset:${C};filter:drop-shadow(0 0 12px ${color}) drop-shadow(0 0 30px ${color}66)"/>
    </svg>
    <div class="ring-center">
      <div class="ring-label" style="color:${color};text-shadow:0 0 30px ${color}88">${label}</div>
      <div class="ring-sub">${subText}</div>
    </div>
  </div></div>

  <div class="stats">
    <div class="stat">
      <svg class="stat-icon" viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round">
        <path d="M2 20c2-3 4-5 7-5s5 4 9 4 5-4 12-4"/><path d="M2 26c2-3 4-5 7-5s5 4 9 4 5-4 12-4"/>
        <path d="M13 6Q16 2 19 6Q22 10 19 14Q16 18 13 14Q10 10 13 6Z" stroke-width="1.5"/>
      </svg>
      <div class="stat-val">${fh}<span class="unit">m</span></div>
      <div class="stat-sub">FACE vague</div>
    </div>
    <div class="sdiv"></div>
    <div class="stat">
      <svg class="wind-arrow" style="transform:rotate(${windDeg}deg);transition:transform .8s" viewBox="0 0 28 28" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
        <line x1="14" y1="24" x2="14" y2="4"/><polyline points="8,10 14,4 20,10"/>
      </svg>
      <div class="stat-val">${Math.round(windSpd)}<span class="unit">km/h</span></div>
      <div class="stat-sub">${windLabel(windDeg)}</div>
    </div>
    <div class="sdiv"></div>
    <div class="stat">
      <svg class="stat-icon" viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round">
        <circle cx="16" cy="16" r="6"/>
        <line x1="16" y1="2" x2="16" y2="5"/><line x1="16" y1="27" x2="16" y2="30"/>
        <line x1="2" y1="16" x2="5" y2="16"/><line x1="27" y1="16" x2="30" y2="16"/>
        <line x1="6" y1="6" x2="8.1" y2="8.1"/><line x1="23.9" y1="23.9" x2="26" y2="26"/>
        <line x1="26" y1="6" x2="23.9" y2="8.1"/><line x1="8.1" y1="23.9" x2="6" y2="26"/>
      </svg>
      <div class="stat-val">${Math.round(temp)}<span class="unit">°</span></div>
      <div class="stat-sub">${wxLabel(wcode)}</div>
    </div>
  </div>

  <div class="extra">
    <div class="extra-card">
      <svg viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M11 2Q14 8 14 13a3 3 0 0 1-6 0Q8 8 11 2Z"/></svg>
      <div><div class="extra-label">Eau</div><div class="extra-val">${seaT!==null?Math.round(seaT):'--'}<span class="unit"> °C</span></div></div>
    </div>
    <div class="extra-card">
      <svg viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round">
        <path d="M3 8Q7 4 11 8Q15 12 19 8"/><path d="M3 14Q7 10 11 14Q15 18 19 14"/>
      </svg>
      <div><div class="extra-label">Période</div><div class="extra-val">${Math.round(period)}<span class="unit"> s</span></div></div>
    </div>
  </div>

  ${tideHTML}

  <div class="hourly-wrap">
    <div class="hourly-title">Prochaines heures — taille face</div>
    <div class="hourly">${pills.map((p,i)=>`<div class="hour-pill${i===0?' active':''}" onclick="selHour=${p.h};render()">
      <div class="hour-time">${String(p.h).padStart(2,'0')}h${p.nextDay?'<span style="font-size:8px;opacity:.4"> +1</span>':''}</div>
      <div class="hour-dot" style="background:${p.st.color};box-shadow:0 0 5px ${p.st.color}55"></div>
      <div class="hour-size" style="color:${p.st.color}">${p.fh}m</div>
      <div class="hour-status" style="color:${p.st.color}99">${p.st.label}</div>
    </div>`).join('')}</div>
  </div>

</div>`;

  // Animate ring
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    const a=document.getElementById('arc');
    if(a) a.style.strokeDashoffset=dash;
  }));
}

async function shareApp(){
  const url=window.location.href;
  if(navigator.share){
    try{ await navigator.share({title:'Mehdia Surf',text:'🌊 Conditions en temps réel à Mehdia Plage !',url}); }catch{}
  } else {
    try{ await navigator.clipboard.writeText(url); }catch{
      const t=document.createElement('textarea');
      t.value=url;document.body.appendChild(t);t.select();document.execCommand('copy');document.body.removeChild(t);
    }
    const toast=document.getElementById('toast');
    if(toast){ toast.classList.add('show'); setTimeout(()=>toast.classList.remove('show'),2500); }
  }
}

async function init(){
  try{
    await fetchData();
    document.getElementById('loading').style.display='none';
    render();
    setInterval(async()=>{ await fetchData(); selHour=getMehdiaHour(); render(); }, 3600000);
  }catch(e){
    document.getElementById('app').innerHTML=`<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:16px;padding:40px;text-align:center">
      <div style="font-size:36px">⚠️</div>
      <div style="color:#ef476f;font-size:13px">Erreur de connexion<br><span style="opacity:.5;font-size:11px">${e.message}</span></div>
    </div>`;
  }
}
init();
</script>
</body>
</html>
